<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Öğren – Antalya GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:           #eef0eb;
            --bg2:          #e4e7e0;
            --white:        rgba(255,255,255,.82);
            --white-solid:  #ffffff;
            --sage:         #c2d4b8;
            --sage-mid:     #a8c09a;
            --sage-dark:    #6e9060;
            --sage-glow:    rgba(168,192,154,.35);
            --sage-glass:   rgba(194,212,184,.22);
            --sage-frost:   rgba(194,212,184,.38);
            --text:         #232820;
            --text2:        #7a8074;
            --text3:        #b4b8ae;
            --pill:         #1c201a;
            --border:       rgba(0,0,0,.055);
            --border-sage:  rgba(110,144,96,.2);
            --border-white: rgba(255,255,255,.7);
            --sh1:          0 2px 8px  rgba(0,0,0,.06);
            --sh2:          0 8px 32px rgba(0,0,0,.08);
            --sh3:          0 20px 60px rgba(0,0,0,.12);
            --sh-sage:      0 8px 24px rgba(110,144,96,.18);
            --blur:         blur(20px);
            --blur2:        blur(32px);
            --r:            22px;
            --r2:           13px;
            --r3:           34px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Mesh gradient zemin ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 60% 50% at 75% 15%, rgba(168,192,154,.28) 0%, transparent 60%),
                radial-gradient(ellipse 50% 45% at 15% 85%, rgba(168,192,154,.18) 0%, transparent 55%),
                radial-gradient(ellipse 40% 35% at 50% 50%, rgba(255,255,255,.35) 0%, transparent 60%);
        }

        /* Subtle goban lines */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(110,144,96,.032) 1px, transparent 1px),
                linear-gradient(90deg, rgba(110,144,96,.032) 1px, transparent 1px);
            background-size: 38px 38px;
        }

        .page {
            position: relative; z-index: 1;
            height: 100vh;
            display: flex; flex-direction: column;
            padding: 14px; gap: 11px;
        }

        /* ════════════════════════════════
           GLASS MIXIN — tekrar eden pattern
        ════════════════════════════════ */
        .glass {
            background: var(--white);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border-white);
            box-shadow: var(--sh2), inset 0 1px 0 rgba(255,255,255,.9);
        }

        /* ════════════════════════════════
           HEADER
        ════════════════════════════════ */
        header {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 22px; height: 58px;
            background: rgba(255,255,255,.75);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid rgba(255,255,255,.85);
            border-radius: var(--r3);
            box-shadow: var(--sh2), inset 0 1px 0 rgba(255,255,255,.95);
            animation: fadeDown .5s ease both;
            transition: box-shadow .3s;
        }
        header:hover {
            box-shadow: var(--sh3), inset 0 1px 0 rgba(255,255,255,.95);
        }

        .hdr-left { display: flex; align-items: center; gap: 14px; }

        .back-link {
            width: 33px; height: 33px; border-radius: 50%;
            background: rgba(255,255,255,.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.8);
            box-shadow: 0 2px 8px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.9);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text2); font-size: .88rem;
            transition: all .22s;
        }
        .back-link:hover {
            background: var(--sage-glass);
            border-color: var(--border-sage);
            color: var(--sage-dark);
            box-shadow: var(--sh-sage), inset 0 1px 0 rgba(255,255,255,.7);
            transform: translateY(-1px);
        }
        .back-link:active { transform: translateY(0) scale(.96); }

        .hdr-sep { width: 1px; height: 20px; background: var(--border); }

        #chapter-tag {
            display: block; font-size: .6rem; font-weight: 700;
            letter-spacing: .16em; text-transform: uppercase;
            color: var(--sage-dark); margin-bottom: 1px;
        }
        #lesson-title {
            font-size: .9rem; font-weight: 600; color: var(--text);
            letter-spacing: -.01em;
        }

        .prog-wrap { display: flex; align-items: center; gap: 10px; }
        #prog-text { font-size: .7rem; font-weight: 500; color: var(--text2); min-width: 34px; text-align: right; }
        .prog-track {
            width: 88px; height: 4px; border-radius: 4px;
            background: rgba(0,0,0,.08); overflow: hidden;
            box-shadow: inset 0 1px 2px rgba(0,0,0,.08);
        }
        #prog-fill {
            height: 100%; width: 0%; border-radius: 4px;
            background: linear-gradient(90deg, var(--sage-mid), var(--sage-dark));
            transition: width .5s ease;
            box-shadow: 0 0 6px var(--sage-glow);
        }

        /* ════════════════════════════════
           MAIN
        ════════════════════════════════ */
        .main-wrap {
            flex: 1; min-height: 0;
            display: flex; gap: 11px;
            animation: fadeUp .5s .1s ease both;
        }

        /* ════════════════════════════════
           SIDEBAR
        ════════════════════════════════ */
        .sidebar {
            width: 204px; flex-shrink: 0;
            background: rgba(255,255,255,.68);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,.82);
            border-radius: var(--r);
            box-shadow: var(--sh2), inset 0 1px 0 rgba(255,255,255,.9);
            display: flex; flex-direction: column; overflow: hidden;
            transition: box-shadow .3s, transform .3s;
        }
        .sidebar:hover {
            box-shadow: var(--sh3), inset 0 1px 0 rgba(255,255,255,.9);
            transform: translateY(-1px);
        }

        .sidebar-hdr {
            padding: 15px 15px 9px;
            font-size: .58rem; font-weight: 700;
            letter-spacing: .2em; text-transform: uppercase;
            color: var(--text3); flex-shrink: 0;
            border-bottom: 1px solid rgba(0,0,0,.05);
            background: rgba(255,255,255,.3);
        }

        #curriculum { flex: 1; overflow-y: auto; padding: 7px; }
        #curriculum::-webkit-scrollbar { width: 3px; }
        #curriculum::-webkit-scrollbar-thumb { background: rgba(0,0,0,.08); border-radius: 3px; }

        .chapter { margin-bottom: 3px; }

        .chapter-title {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; border-radius: var(--r2);
            font-size: .74rem; font-weight: 600; cursor: pointer;
            color: var(--text2); transition: all .2s; user-select: none;
            border: 1px solid transparent;
        }
        .chapter-title:hover {
            background: rgba(255,255,255,.7);
            border-color: rgba(255,255,255,.9);
            color: var(--text);
            box-shadow: var(--sh1);
            transform: translateX(2px);
        }
        .ch-left { display: flex; align-items: center; gap: 8px; }
        .ch-num {
            width: 18px; height: 18px; border-radius: 50%;
            background: rgba(168,192,154,.25);
            border: 1px solid var(--border-sage);
            color: var(--sage-dark); font-size: .6rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            transition: all .2s;
        }
        .chapter-title:hover .ch-num {
            background: var(--sage-glass);
            box-shadow: 0 0 8px var(--sage-glow);
        }
        .ch-arrow { font-size: .58rem; color: var(--text3); transition: transform .2s; }
        .chapter-title.open .ch-arrow { transform: rotate(90deg); }

        .lesson-list { display: none; flex-direction: column; padding: 2px 0 2px 5px; }
        .lesson-list.open { display: flex; }

        .lesson-item {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 10px; margin: 1px 0;
            border-radius: 10px; cursor: pointer;
            font-size: .74rem; color: var(--text2);
            border: 1px solid transparent;
            transition: all .2s;
        }
        .lesson-item:hover {
            background: rgba(255,255,255,.75);
            border-color: rgba(255,255,255,.9);
            color: var(--text);
            box-shadow: var(--sh1);
            transform: translateX(3px);
        }
        .lesson-item.active {
            background: var(--sage-frost);
            backdrop-filter: blur(8px);
            border-color: var(--border-sage);
            color: var(--sage-dark); font-weight: 600;
            box-shadow: var(--sh-sage), inset 0 1px 0 rgba(255,255,255,.6);
            transform: translateX(3px);
        }
        .lesson-item.done { color: var(--sage-mid); }
        .lesson-item.done .li-check { display: inline; }
        .li-check { display: none; font-size: .6rem; }
        .li-num { font-size: .6rem; opacity: .45; min-width: 18px; }

        /* ════════════════════════════════
           CONTENT
        ════════════════════════════════ */
        .content-area {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column; gap: 11px;
        }

        .mid-row { flex: 1; min-height: 0; display: flex; gap: 11px; }

        /* ── TAHTA KARTI ── */
        .board-card {
            aspect-ratio: 1; max-height: 100%; flex-shrink: 0;
            background: rgba(255,255,255,.72);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid rgba(255,255,255,.88);
            border-radius: var(--r);
            box-shadow:
                var(--sh2),
                inset 0 1px 0 rgba(255,255,255,.95),
                inset 0 -1px 0 rgba(0,0,0,.03);
            display: flex; align-items: center; justify-content: center;
            padding: 14px; overflow: hidden; position: relative;
            transition: box-shadow .3s, transform .3s;
        }
        .board-card:hover {
            box-shadow:
                var(--sh3),
                0 0 30px rgba(168,192,154,.15),
                inset 0 1px 0 rgba(255,255,255,.95);
            transform: translateY(-2px) scale(1.005);
        }

        /* Üst parlak kenar — 3D his */
        .board-card::before {
            content: '';
            position: absolute; top: 0; left: 12%; right: 12%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.95), transparent);
        }

        /* Sage glow iç yansıma */
        .board-card::after {
            content: '';
            position: absolute; inset: 0; border-radius: var(--r);
            background: radial-gradient(ellipse 55% 45% at 65% 35%, rgba(168,192,154,.12) 0%, transparent 65%);
            pointer-events: none;
        }

        #goban { max-width: 100%; max-height: 100%; display: block; touch-action: none; position: relative; z-index: 1; }

        /* ── AÇIKLAMA KARTI ── */
        .info-card {
            flex: 1; min-width: 0;
            background: var(--sage-frost);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid rgba(255,255,255,.72);
            border-radius: var(--r);
            box-shadow:
                var(--sh2),
                inset 0 1px 0 rgba(255,255,255,.85),
                inset 1px 0 0 rgba(255,255,255,.5);
            padding: 22px 24px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: .8rem;
            position: relative;
            transition: box-shadow .3s, transform .3s;
        }
        .info-card:hover {
            box-shadow:
                var(--sh3),
                0 0 24px var(--sage-glow),
                inset 0 1px 0 rgba(255,255,255,.85);
            transform: translateY(-1px);
        }
        .info-card::-webkit-scrollbar { width: 3px; }
        .info-card::-webkit-scrollbar-thumb { background: rgba(110,144,96,.18); border-radius: 3px; }

        /* Frosted beyaz overlay */
        .info-card::before {
            content: '';
            position: absolute; inset: 0; border-radius: var(--r);
            background: rgba(255,255,255,.42);
            pointer-events: none;
        }

        /* Sağ üst köşe parlak nokta */
        .info-card::after {
            content: '';
            position: absolute; top: -1px; right: 30px; left: 30%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.9), transparent);
        }

        #lesson-body {
            font-size: .87rem; line-height: 1.8; color: rgba(35,40,32,.72);
            position: relative; z-index: 1;
        }
        #lesson-body p { margin: 0 0 .7rem; }
        #lesson-body p:last-child { margin-bottom: 0; }
        #lesson-body strong { color: var(--text); font-weight: 600; }
        #lesson-body em { color: var(--sage-dark); font-style: normal; }
        #lesson-body ul, #lesson-body ol { margin: .3rem 0 .7rem 1.2rem; line-height: 1.9; font-size: .83rem; }

        .highlight {
            background: rgba(255,255,255,.55);
            backdrop-filter: blur(6px);
            border-left: 2px solid var(--sage-mid);
            padding: 10px 14px; margin: .5rem 0;
            border-radius: 0 10px 10px 0;
            font-size: .83rem; line-height: 1.65; color: var(--text);
            box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
            position: relative; z-index: 1;
        }

        .term {
            display: inline-block;
            background: rgba(255,255,255,.65);
            backdrop-filter: blur(4px);
            border: 1px solid var(--border-sage);
            border-radius: 6px; padding: .04rem .36rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: .75rem; color: var(--sage-dark); font-weight: 500;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            position: relative; z-index: 1;
        }

        /* ════════════════════════════════
           FOOTER
        ════════════════════════════════ */
        .footer-bar {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 22px; height: 54px;
            background: rgba(255,255,255,.75);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid rgba(255,255,255,.88);
            border-radius: var(--r3);
            box-shadow: var(--sh2), inset 0 1px 0 rgba(255,255,255,.95);
            transition: box-shadow .3s;
        }
        .footer-bar:hover {
            box-shadow: var(--sh3), inset 0 1px 0 rgba(255,255,255,.95);
        }

        /* feedback */
        .feedback-box {
            display: flex; align-items: center; gap: 8px;
            font-size: .81rem; font-weight: 500;
            padding: 6px 14px; border-radius: 30px;
            transition: all .25s;
        }
        .feedback-box.info {
            color: var(--text2); background: transparent;
        }
        .feedback-box.correct {
            color: var(--sage-dark);
            background: rgba(168,192,154,.18);
            border: 1px solid var(--border-sage);
            box-shadow: 0 0 12px var(--sage-glow);
        }
        .feedback-box.wrong {
            color: #b05a48;
            background: rgba(176,90,72,.08);
            border: 1px solid rgba(176,90,72,.18);
        }
        .feedback-box .fb-icon { font-size: .92rem; }

        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
        }
        .shake { animation: shake .3s ease; }

        .nav-right { display: flex; align-items: center; gap: 10px; }

        #step-dots { display: flex; gap: 5px; align-items: center; }
        .sdot {
            width: 6px; height: 6px; border-radius: 50%;
            background: rgba(0,0,0,.1); cursor: pointer; transition: all .22s;
        }
        .sdot:hover { background: var(--sage); transform: scale(1.2); }
        .sdot.active {
            background: var(--sage-mid); transform: scale(1.45);
            box-shadow: 0 0 6px var(--sage-glow);
        }
        .sdot.done { background: var(--sage); }

        #step-counter {
            font-size: .67rem; font-weight: 500; color: var(--text3);
            font-family: 'JetBrains Mono', monospace; min-width: 46px;
        }

        .nav-sep { width: 1px; height: 18px; background: var(--border); }

        .nav-btn {
            border: none; height: 33px; padding: 0 17px; border-radius: 33px;
            font-family: inherit; font-size: .77rem; font-weight: 500;
            cursor: pointer; transition: all .22s;
            display: flex; align-items: center; gap: 5px;
        }

        #btn-prev {
            background: rgba(255,255,255,.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.85);
            color: var(--text2);
            box-shadow: var(--sh1), inset 0 1px 0 rgba(255,255,255,.9);
        }
        #btn-prev:hover {
            background: rgba(255,255,255,.85);
            color: var(--text);
            box-shadow: var(--sh2), inset 0 1px 0 rgba(255,255,255,.95);
            transform: translateY(-1px);
        }
        #btn-prev:active { transform: translateY(0) scale(.97); }

        #btn-next {
            background: var(--pill);
            color: #fff; font-weight: 600;
            box-shadow: 0 4px 14px rgba(28,32,26,.3), inset 0 1px 0 rgba(255,255,255,.08);
        }
        #btn-next:hover {
            background: #2c322a;
            box-shadow: 0 8px 24px rgba(28,32,26,.4), 0 0 16px rgba(110,144,96,.2), inset 0 1px 0 rgba(255,255,255,.1);
            transform: translateY(-2px);
        }
        #btn-next:active { transform: translateY(0) scale(.97); box-shadow: var(--sh1); }

        button:disabled { opacity: .25; cursor: not-allowed; pointer-events: none; }

        /* ════════════════════════════════
           MODAL
        ════════════════════════════════ */
        #complete-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(238,240,235,.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: none; align-items: center; justify-content: center;
        }
        #complete-screen.show { display: flex; }

        .modal {
            background: rgba(255,255,255,.85);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid rgba(255,255,255,.92);
            border-radius: 28px; padding: 40px 44px; text-align: center;
            box-shadow: var(--sh3), inset 0 1px 0 rgba(255,255,255,.95);
            max-width: 360px; width: 100%;
            animation: popIn .35s ease both;
        }
        .modal-icon { font-size: 2.8rem; margin-bottom: 14px; }
        .modal h2 { font-size: 1.25rem; font-weight: 700; color: var(--text); margin: 0 0 10px; }
        #complete-msg { font-size: .87rem; color: var(--text2); line-height: 1.65; margin: 0 0 24px; }
        .modal-btn {
            background: var(--pill); color: #fff; border: none;
            padding: 12px 28px; border-radius: 30px;
            font-family: inherit; font-size: .84rem; font-weight: 600;
            cursor: pointer; transition: all .22s;
            box-shadow: 0 4px 14px rgba(28,32,26,.25);
        }
        .modal-btn:hover {
            background: #2c322a;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(28,32,26,.35), 0 0 14px rgba(110,144,96,.2);
        }
        .modal-btn:active { transform: scale(.97); }

        /* ── ANİMASYONLAR ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(.88) translateY(12px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media(max-width: 820px) {
            .sidebar { display: none; }
            .mid-row { flex-direction: column; }
            .board-card { aspect-ratio: auto; width: 100%; max-height: 280px; }
        }
    </style>
</head>
<body>
<div class="page">

    <header>
        <div class="hdr-left">
            <a href="index.html" class="back-link">←</a>
            <div class="hdr-sep"></div>
            <div>
                <span id="chapter-tag">Yükleniyor…</span>
                <div id="lesson-title">Go Öğren</div>
            </div>
        </div>
        <div class="prog-wrap">
            <span id="prog-text">0/0</span>
            <div class="prog-track"><div id="prog-fill"></div></div>
        </div>
    </header>

    <div class="main-wrap">
        <aside class="sidebar">
            <div class="sidebar-hdr">Müfredat</div>
            <div id="curriculum"></div>
        </aside>

        <main class="content-area">
            <div class="mid-row">
                <div class="board-card">
                    <canvas id="goban"></canvas>
                </div>
                <div class="info-card">
                    <div id="lesson-body"></div>
                </div>
            </div>

            <div class="footer-bar">
                <div id="feedback" class="feedback-box info">
                    <span class="fb-icon">💡</span>
                    <span id="fb-text">Yükleniyor…</span>
                </div>
                <div class="nav-right">
                    <div id="step-dots"></div>
                    <span id="step-counter">1 / 1</span>
                    <div class="nav-sep"></div>
                    <button id="btn-prev" class="nav-btn" onclick="prevStep()">← Geri</button>
                    <button id="btn-next" class="nav-btn" onclick="nextStep()">İleri →</button>
                </div>
            </div>
        </main>
    </div>

    <div id="complete-screen">
        <div class="modal">
            <div class="modal-icon">🎊</div>
            <h2>Tebrikler!</h2>
            <p id="complete-msg"></p>
            <button class="modal-btn" onclick="closeComplete()">Devam Et →</button>
        </div>
    </div>

    <script src="ogren.js"></script>
</div>

<script>
/* Fare hareketine göre 3D tilt efekti — board ve info card */
document.querySelectorAll('.board-card, .info-card, .sidebar').forEach(el => {
    el.addEventListener('mousemove', e => {
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - .5;
        const y = (e.clientY - r.top)  / r.height - .5;
        const intensity = el.classList.contains('board-card') ? 4 : 2.5;
        el.style.transform = `perspective(900px) rotateY(${x * intensity}deg) rotateX(${-y * intensity}deg) translateZ(4px)`;
    });
    el.addEventListener('mouseleave', () => {
        el.style.transform = '';
        el.style.transition = 'transform .5s ease, box-shadow .3s';
    });
    el.addEventListener('mouseenter', () => {
        el.style.transition = 'transform .12s ease, box-shadow .3s';
    });
});
</script>
</body>
</html>
