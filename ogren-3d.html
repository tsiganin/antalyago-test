<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Öğren – Antalya GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f2f5;
            --panel-white: #ffffff;
            --accent-green: #a8d5ba;
            --accent-green-dark: #8ebf9f;
            --text-main: #2d2e32;
            --text-muted: #6b7280;
            --btn-dark: #2d2e32;
            --radius-lg: 20px;
            --radius-sm: 12px;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.03);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0; padding: 16px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        /* ── HEADER ── */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-white); padding: 10px 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); margin-bottom: 14px;
            flex-shrink: 0;
        }

        .header-left { display: flex; align-items: center; gap: 16px; }
        .back-link { text-decoration: none; font-size: 1.4rem; color: var(--text-muted); line-height: 1; }
        .back-link:hover { color: var(--text-main); }

        /* chapter-tag ve lesson-title — JS bunları günceller */
        #chapter-tag {
            font-size: 0.68rem; color: var(--accent-green-dark);
            font-weight: 700; text-transform: uppercase; letter-spacing: .08em;
            display: block; margin-bottom: 2px;
        }
        #lesson-title { margin: 0; font-size: 1rem; font-weight: 700; }

        /* Progress */
        .prog-container { display: flex; align-items: center; gap: 10px; }
        #prog-text { font-size: 0.78rem; font-weight: 600; color: var(--text-muted); min-width: 38px; text-align: right; }
        .prog-bg { width: 90px; height: 5px; background: #eee; border-radius: 10px; overflow: hidden; }
        #prog-fill { height: 100%; background: var(--accent-green); width: 0%; transition: width .4s; }

        /* ── MAIN ── */
        .main-wrapper {
            display: flex; gap: 14px; flex: 1; min-height: 0;
        }

        /* ── SOL: SİDEBAR ── */
        .side-panel {
            width: 220px; flex-shrink: 0;
            background: var(--panel-white); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .side-panel-header {
            padding: 14px 16px 8px;
            font-size: 0.68rem; text-transform: uppercase;
            letter-spacing: .1em; color: var(--text-muted); font-weight: 700;
            border-bottom: 1px solid #f0f2f5; flex-shrink: 0;
        }

        /* #curriculum — JS tarafından doldurulur */
        #curriculum { flex: 1; overflow-y: auto; padding: 8px; }

        /* JS buildSidebar() bu class'ları oluşturur */
        .chapter { margin-bottom: 6px; }

        .chapter-title {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; border-radius: 10px;
            font-size: 0.78rem; font-weight: 700; cursor: pointer;
            background: #f8f9fa; color: var(--text-main);
            transition: background .15s; user-select: none;
        }
        .chapter-title:hover { background: #eef0f3; }
        .ch-left { display: flex; align-items: center; gap: 8px; }
        .ch-num {
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--accent-green); color: #fff;
            font-size: 0.68rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .ch-arrow { font-size: 0.65rem; color: var(--text-muted); transition: transform .2s; }
        .chapter-title.open .ch-arrow { transform: rotate(90deg); }

        .lesson-list { display: none; flex-direction: column; padding-left: 4px; }
        .lesson-list.open { display: flex; }

        .lesson-item {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 10px; margin: 2px 0;
            border-radius: 8px; cursor: pointer;
            font-size: 0.8rem; color: var(--text-muted);
            transition: background .15s, color .15s;
            border-left: 2px solid transparent;
        }
        .lesson-item:hover { background: #f0f2f5; color: var(--text-main); }
        .lesson-item.active {
            background: var(--accent-green); color: #fff; font-weight: 600;
            border-left-color: var(--accent-green-dark);
        }
        .lesson-item.done { color: #4ade80; }
        .lesson-item.done .li-check { display: inline; }

        .li-check { display: none; font-size: 0.65rem; }
        .li-num { font-size: 0.65rem; color: inherit; opacity: .7; min-width: 22px; }

        /* ── SAĞ: CONTENT ── */
        .content-area {
            flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 0;
        }

        /* Tahta + açıklama yan yana */
        .middle-row {
            flex: 1; display: flex; gap: 12px; min-height: 0;
        }

        /* Tahta */
        .board-card {
            aspect-ratio: 1; max-height: 100%;
            background: var(--panel-white); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; padding: 12px; flex-shrink: 0;
        }
        #goban { max-width: 100%; max-height: 100%; touch-action: none; display: block; }

        /* Açıklama */
        .info-card {
            flex: 1; background: var(--panel-white); border-radius: var(--radius-lg);
            padding: 20px; box-shadow: var(--shadow-soft); overflow-y: auto;
            display: flex; flex-direction: column; gap: .75rem;
        }

        /* JS lesson-body içine HTML yazar */
        #lesson-body { font-size: 0.9rem; line-height: 1.7; color: #444; }
        #lesson-body p { margin: 0 0 .6rem; }
        #lesson-body p:last-child { margin-bottom: 0; }
        #lesson-body strong { color: var(--text-main); }
        #lesson-body ul, #lesson-body ol { margin: .3rem 0 .6rem 1.2rem; line-height: 1.9; font-size: .87rem; }

        .highlight {
            background: #fff9e6; border-left: 3px solid #f6ad55;
            padding: 10px 14px; margin: .5rem 0; border-radius: 0 6px 6px 0;
            font-size: .86rem; line-height: 1.6;
        }
        .term {
            display: inline-block; background: #f0f2f5;
            border: 1px solid #dde; border-radius: 3px;
            padding: .05rem .35rem; font-family: 'JetBrains Mono', monospace;
            font-size: .8rem; color: var(--accent-green-dark); font-weight: 600;
        }

        /* ── FOOTER ── */
        .footer-controls {
            background: var(--panel-white); padding: 10px 20px;
            border-radius: var(--radius-lg); box-shadow: var(--shadow-soft);
            display: flex; justify-content: space-between; align-items: center;
            flex-shrink: 0;
        }

        /* feedback — JS setFb() bu div'i günceller */
        /* JS: box.className = 'feedback-box ' + type */
        .feedback-box {
            display: flex; align-items: center; gap: 8px;
            font-weight: 600; font-size: 0.85rem;
        }
        .feedback-box.info    { color: var(--text-muted); }
        .feedback-box.correct { color: #16a34a; }
        .feedback-box.wrong   { color: #dc2626; }
        .feedback-box .fb-icon { font-size: 1rem; }

        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)}
        }
        .shake { animation: shake .3s ease; }

        .btn-group { display: flex; gap: 8px; align-items: center; }

        /* step-dots — JS renderDots() doldurur */
        #step-dots { display: flex; gap: 5px; }
        .sdot {
            width: 7px; height: 7px; border-radius: 50%;
            background: #ddd; cursor: pointer; transition: all .2s;
        }
        .sdot.active { background: var(--accent-green); transform: scale(1.3); }
        .sdot.done   { background: var(--accent-green-dark); }

        #step-counter { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; min-width: 56px; }

        button {
            border: none; padding: 9px 18px; border-radius: 30px;
            font-weight: 600; cursor: pointer; transition: .2s;
            font-family: inherit; font-size: 0.82rem;
        }
        #btn-prev { background: #f0f2f5; color: var(--text-main); }
        #btn-prev:hover { background: #e2e5ea; }
        #btn-next { background: var(--btn-dark); color: #fff; }
        #btn-next:hover { background: #444; }
        button:disabled { opacity: .3; cursor: not-allowed; }

        /* ── TAMAMLANDI MODAL ── */
        #complete-screen {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.35);
            backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        #complete-screen.show { display: flex; }
        .modal {
            background: #fff; padding: 36px 40px;
            border-radius: 28px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            max-width: 360px; width: 100%;
        }
        .modal h2 { color: var(--accent-green-dark); margin: 0 0 12px; font-size: 1.4rem; }
        .modal p  { color: var(--text-muted); margin: 0 0 20px; line-height: 1.6; }
        .modal button {
            background: var(--btn-dark); color: #fff;
            padding: 11px 28px; font-size: .88rem;
        }

        /* Scrollbar */
        #curriculum::-webkit-scrollbar, .info-card::-webkit-scrollbar { width: 4px; }
        #curriculum::-webkit-scrollbar-thumb, .info-card::-webkit-scrollbar-thumb {
            background: #ddd; border-radius: 4px;
        }

        @media(max-width: 768px) {
            .middle-row { flex-direction: column; }
            .board-card { aspect-ratio: auto; width: 100%; }
            .side-panel { display: none; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <a href="index.html" class="back-link">←</a>
            <div>
                <span id="chapter-tag">Yükleniyor…</span>
                <h1 id="lesson-title">Go Öğren</h1>
            </div>
        </div>
        <div class="prog-container">
            <span id="prog-text">0/0</span>
            <div class="prog-bg"><div id="prog-fill"></div></div>
        </div>
    </header>

    <!-- MAIN -->
    <div class="main-wrapper">

        <!-- SOL: MüFREDAT -->
        <aside class="side-panel">
            <div class="side-panel-header">Müfredat</div>
            <div id="curriculum"></div>
        </aside>

        <!-- SAĞ: CONTENT -->
        <main class="content-area">

            <div class="middle-row">
                <!-- TAHTA -->
                <div class="board-card">
                    <canvas id="goban"></canvas>
                </div>

                <!-- AÇIKLAMA -->
                <div class="info-card">
                    <div id="lesson-body"></div>
                </div>
            </div>

            <!-- FOOTER NAVİGASYON -->
            <div class="footer-controls">
                <!-- feedback — JS: id="feedback" ve class="feedback-box info/correct/wrong" -->
                <div id="feedback" class="feedback-box info">
                    <span class="fb-icon">💡</span>
                    <span id="fb-text">Yükleniyor…</span>
                </div>

                <div class="btn-group">
                    <div id="step-dots"></div>
                    <span id="step-counter">1 / 1</span>
                    <button id="btn-prev" onclick="prevStep()">← Geri</button>
                    <button id="btn-next" onclick="nextStep()">İleri →</button>
                </div>
            </div>

        </main>
    </div>

    <!-- TAMAMLANDI MODAL -->
    <div id="complete-screen">
        <div class="modal">
            <h2>🎊 Tebrikler!</h2>
            <p id="complete-msg"></p>
            <button onclick="closeComplete()">Devam Et →</button>
        </div>
    </div>

    <script src="ogren.js"></script>

</body>
</html>
