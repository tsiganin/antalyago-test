/* ═══════════════════════════════════════════════════════
   LESSON ENGINE
═══════════════════════════════════════════════════════ */
const ALL_LESSONS   = CURRICULUM.flatMap(c=>c.lessons);
const TOTAL_LESSONS = ALL_LESSONS.length;
let doneLessons = new Set(JSON.parse(localStorage.getItem('go_done_3d')||'[]'));
let CUR_LESSON = null, CUR_STEP = 0, stepDone = false, CUR_STEP_DATA = null;
let koPoint = null;
let nextMoveHint = null;

function loadLesson(lesson) {
  CUR_LESSON=lesson; CUR_STEP=0;
  loadStep(0); updateSidebar(); updateProgress();
}

function loadStep(idx) {
  const step = CUR_LESSON.steps[idx];
  if(!step) return;
  CUR_STEP=idx; CUR_STEP_DATA=step; stepDone=false;
  ghostActive=false; rotateMode=false;
  koPoint = step.initialKoIndicator || null;
  nextMoveHint = null;

  const chap = CURRICULUM.find(c=>c.lessons.some(l=>l.id===CUR_LESSON.id));
  document.getElementById('chapter-tag').textContent   = (currentLang!=='tr'&&TITLE_T[chap?.id]?.[currentLang])||chap?.title||'';
  document.getElementById('lesson-title').textContent  = (currentLang!=='tr'&&TITLE_T[CUR_LESSON.id]?.[currentLang])||CUR_LESSON.title;
  document.getElementById('lesson-body').innerHTML     = stepT(CUR_LESSON.id,idx,'text')||step.text;
  const counterTxt = `${idx+1} / ${CUR_LESSON.steps.length}`;
  document.getElementById('step-counter').textContent  = `${t('step')} ${counterTxt}`;
  document.getElementById('cc-counter').textContent    = counterTxt;
  document.getElementById('mob-counter').textContent   = counterTxt;
  document.getElementById('btn-prev').disabled  = (idx===0);
  document.getElementById('cnav-prev').disabled = (idx===0);
  document.getElementById('mprev').disabled     = (idx===0);
  renderDots();

  /* Board size — adıma özgü boyutu uygula, sonra tahtayı sıfırla */
  if(!step.boardSelector) {
    const ns = step.size || 9;
    if(ns !== SIZE) { SIZE=ns; CELL=ns===9?48:ns===13?32:22; HALF=(SIZE-1)*CELL/2; STONE_R=CELL*(20/48); }
  }
  document.getElementById('board-picker').classList.toggle('show', !!step.boardSelector);

  /* Clear board, then seed */
  game.reset();
  if(step.turn) game.turn = step.turn==='black'?'black':'white';
  (step.board||[]).forEach(s=>game.seed(s.x,s.y,s.color));

  /* Camera */
  if(step.camera) animateCamera(step.camera);

  /* Feedback */
  setFb(stepT(CUR_LESSON.id,idx,'fb')||step.fb?.t||t('defaultFb'), step.fb?.c||'info');

  /* Mode */
  if(step.auto || step.moves?.length) {
    stepDone=true; ghostActive=false;
    document.getElementById('rotate-toggle').style.display='none';
  } else {
    ghostActive=true;
    document.getElementById('rotate-toggle').style.display='block';
  }

  if(step.moves?.length) playMoves(step.moves, step);

  updateNextBtn(step);
}

function playMoves(moves, step) {
  const defaultSp = step?.moveSpeed || 1;
  let i = 0;
  function next() {
    if(i >= moves.length) {
      if(step?.koPoint) koPoint = step.koPoint;
      nextMoveHint = null;
      return;
    }
    const mv = moves[i++];
    const sp = mv.speed !== undefined ? mv.speed : defaultSp;
    nextMoveHint = null;
    game.seed(mv.x, mv.y, mv.color);
    if(i < moves.length) nextMoveHint = {x: moves[i].x, y: moves[i].y};
    setTimeout(() => {
      if(mv.capture) mv.capture.forEach(c => game.removeStone(c.x, c.y));
      if('indicatorAfter' in mv) koPoint = mv.indicatorAfter;
      setTimeout(next, 2400 * sp);
    }, 1200 * sp);
  }
  setTimeout(next, 1200 * defaultSp);
}

function onClick3D(gx,gz) {
  const step=CUR_STEP_DATA;
  if(!step||stepDone) return;
  if(!step.answer&&step.answers!=='any'&&!Array.isArray(step.answers)) return;
  if(game.grid[gz][gx]) return;

  let ok=false;
  if(step.answers==='any') ok=true;
  else if(Array.isArray(step.answers)) ok=step.answers.some(a=>a.x===gx&&a.y===gz);
  else if(step.answer) ok=(step.answer.x===gx&&step.answer.y===gz);

  if(ok) {
    game.seed(gx, gz, step.turn||'black');
    setFb(stepT(CUR_LESSON.id,CUR_STEP,'fb_ok')||step.fb_ok||t('defaultOk'),'correct');
    flashFeedback('correct');
    stepDone=true; ghostActive=false;
    if(step.capture) {
      setTimeout(()=>{ step.capture.forEach(c=>game.removeStone(c.x,c.y)); },380);
    }
    if(step.movesAfterAnswer) {
      setTimeout(()=>playMoves(step.movesAfterAnswer, step), 500);
    } else if(step.movesAfterAnswerMap) {
      const movesAfter = step.movesAfterAnswerMap[`${gx},${gz}`];
      if(movesAfter) setTimeout(()=>playMoves(movesAfter, step), 500);
    }
    updateNextBtn(step);
  } else {
    setFb(stepT(CUR_LESSON.id,CUR_STEP,'fb_err')||step.fb_err||t('defaultErr'),'wrong');
    flashFeedback('wrong');
    const fb=document.getElementById('feedback');
    fb.classList.add('shake');
    setTimeout(()=>fb.classList.remove('shake'),320);
  }
}

function nextStep() {
  if(!CUR_LESSON) return;
  if(CUR_STEP<CUR_LESSON.steps.length-1){ loadStep(CUR_STEP+1); return; }
  doneLessons.add(CUR_LESSON.id);
  localStorage.setItem('go_done_3d',JSON.stringify([...doneLessons]));
  updateSidebar(); updateProgress();
  const chap=CURRICULUM.find(c=>c.lessons.some(l=>l.id===CUR_LESSON.id));
  if(chap&&chap.lessons.every(l=>doneLessons.has(l.id))){
    document.getElementById('complete-msg').textContent=`"${chap.title}" bölümünü tamamladın! 🎊`;
    document.getElementById('complete-screen').classList.add('show');
    return;
  }
  const idx=ALL_LESSONS.findIndex(l=>l.id===CUR_LESSON.id);
  if(idx<ALL_LESSONS.length-1) loadLesson(ALL_LESSONS[idx+1]);
}
window.closeComplete = function(){
  document.getElementById('complete-screen').classList.remove('show');
  const idx=ALL_LESSONS.findIndex(l=>l.id===CUR_LESSON.id);
  if(idx<ALL_LESSONS.length-1) loadLesson(ALL_LESSONS[idx+1]);
};
function prevStep(){ if(CUR_STEP>0) loadStep(CUR_STEP-1); }

function updateNextBtn(step) {
  const btn=document.getElementById('btn-next');
  const cnext=document.getElementById('cnav-next');
  const mnext=document.getElementById('mnext');
  const isLast=(CUR_STEP===CUR_LESSON.steps.length-1);
  const enabled=!!(step.auto||stepDone);
  btn.disabled=!enabled;
  btn.textContent=isLast?'Dersi Bitir ✓':'İleri →';
  cnext.disabled=!enabled;
  cnext.textContent=isLast?'✓':'›';
  mnext.disabled=!enabled;
  mnext.textContent=isLast?'✓':'›';
}

/* Sidebar */
function buildSidebar() {
  const el=document.getElementById('curriculum'); el.innerHTML='';
  CURRICULUM.forEach((chap,ci)=>{
    const chapEl=document.createElement('div'); chapEl.className='chapter';
    const title=document.createElement('div'); title.className='ch-title open';
    const chapTitleTxt=(currentLang!=='tr'&&TITLE_T[chap.id]?.[currentLang])||chap.title;
    title.innerHTML=`<div class="ch-left"><span class="ch-num">${ci+1}</span><span>${chapTitleTxt}</span></div><span class="ch-arrow">▶</span>`;
    title.onclick=()=>{ title.classList.toggle('open'); list.classList.toggle('open'); };
    chapEl.appendChild(title);
    const list=document.createElement('div'); list.className='lesson-list open';
    chap.lessons.forEach((lesson,li)=>{
      const item=document.createElement('div');
      item.className='lesson-item'+(CUR_LESSON?.id===lesson.id?' active':'')+(doneLessons.has(lesson.id)?' done':'');
      item.dataset.id=lesson.id;
      const lessonTitleTxt=(currentLang!=='tr'&&TITLE_T[lesson.id]?.[currentLang])||lesson.title;
      item.innerHTML=`<span class="li-check">✓</span><span class="li-num">${ci+1}.${li+1}</span>${lessonTitleTxt}`;
      item.onclick=()=>loadLesson(lesson);
      list.appendChild(item);
    });
    chapEl.appendChild(list); el.appendChild(chapEl);
  });
}
function updateSidebar() {
  document.querySelectorAll('.lesson-item').forEach(el=>{
    const id=el.dataset.id;
    el.classList.toggle('active', CUR_LESSON?.id===id);
    el.classList.toggle('done',   doneLessons.has(id));
  });
}
function updateProgress() {
  const done=doneLessons.size, pct=TOTAL_LESSONS>0?Math.round(done/TOTAL_LESSONS*100):0;
  document.getElementById('prog-text').textContent=`${done} / ${TOTAL_LESSONS}`;
  document.getElementById('prog-fill').style.width=pct+'%';
}
function setFb(text,type) {
  const box=document.getElementById('feedback');
  const icon=box.querySelector('.fb-icon');
  box.className='feedback-box '+type;  // keep id, reset class
  box.id='feedback';
  document.getElementById('fb-text').textContent=text;
  icon.textContent=type==='correct'?'✓':type==='wrong'?'✗':'💡';
}
function renderDots() {
  const el=document.getElementById('step-dots'); el.innerHTML='';
  if(!CUR_LESSON) return;
  CUR_LESSON.steps.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='sdot'+(i===CUR_STEP?' active':i<CUR_STEP?' done':'');
    d.onclick=()=>{ if(i<CUR_STEP) loadStep(i); };
    el.appendChild(d);
  });
}
function flashFeedback(type) {
  const fl=document.getElementById('flash');
  fl.style.background=type==='correct'?'rgba(62,207,128,.06)':'rgba(224,80,80,.08)';
  fl.style.opacity='1';
  setTimeout(()=>{ fl.style.opacity='0'; },350);
}

/* ═══════════════════════════════════════════════════════
   LOOP + INIT
═══════════════════════════════════════════════════════ */
let lastT=performance.now();
function loop(now) {
  const dt=Math.min((now-lastT)/1000,.05); lastT=now;
  hlTime += dt;
  updateAnimations(dt);
  render();
  requestAnimationFrame(loop);
}

document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===currentLang));
buildSidebar(); updateProgress();
const first=ALL_LESSONS.find(l=>!doneLessons.has(l.id))||ALL_LESSONS[0];
loadLesson(first);
applyLang();
requestAnimationFrame(loop);
</script>
</body>
</html>
