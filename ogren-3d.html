<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Öğren – Antalya GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ── Açık zemin ── */
            --bg:           #d8d8d4;
            --bg2:          #cececa;
            --bg3:          #c8c8c4;
            --bg4:          #c0c0bc;

            /* ── Jade / yeşil aksan ── */
            --jade:         #2d6647;
            --jade-mid:     #3a8560;
            --jade-bright:  #48a076;
            --jade-glow:    rgba(45,102,71,.25);
            --jade-glass:   rgba(45,102,71,.1);
            --jade-frost:   rgba(45,102,71,.14);

            /* ── Glassmorphic yüzeyler ── */
            --glass-dark:   rgba(220,220,216,.78);
            --glass-mid:    rgba(215,215,210,.72);
            --glass-light:  rgba(210,210,205,.65);

            /* ── Neumorphic ışık/gölge ── */
            --nm-light:     rgba(255,255,255,.7);
            --nm-shadow:    rgba(0,0,0,.15);
            --nm-inset-l:   rgba(255,255,255,.6);
            --nm-inset-s:   rgba(0,0,0,.12);

            /* ── Neumorphic kutular ── */
            --nm-box:
                4px 4px 10px rgba(0,0,0,.18),
               -3px -3px 8px rgba(255,255,255,.75);
            --nm-inset:
                inset 3px 3px 7px rgba(0,0,0,.14),
                inset -2px -2px 5px rgba(255,255,255,.7);
            --nm-press:
                inset 4px 4px 9px rgba(0,0,0,.18),
                inset -2px -2px 5px rgba(255,255,255,.65);

            /* ── Metin ── */
            --text:         #1a2018;
            --text2:        #3d4a3a;
            --text3:        #7a8a76;
            --text-accent:  #2d7a50;

            /* ── Kenarlık ── */
            --border:       rgba(0,0,0,.1);
            --border-jade:  rgba(45,122,80,.3);
            --border-top:   rgba(255,255,255,.8);

            /* ── Gölgeler ── */
            --sh1:  0 2px 8px rgba(0,0,0,.12);
            --sh2:  0 8px 28px rgba(0,0,0,.14);
            --sh3:  0 20px 60px rgba(0,0,0,.2);
            --sh-jade: 0 6px 24px rgba(45,122,80,.2);

            /* ── Blur ── */
            --blur:  blur(24px);
            --blur2: blur(40px);

            /* ── Radius ── */
            --r:  20px;
            --r2: 12px;
            --r3: 30px;

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; overflow: hidden;
            font-family: 'Sora', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Zemin gradyanı ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 65% 55% at 80% 10%, rgba(61,122,92,.09) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 10% 90%, rgba(61,122,92,.06) 0%, transparent 55%),
                radial-gradient(ellipse 35% 30% at 50% 50%, rgba(200,200,190,.3) 0%, transparent 60%);
        }

        /* ── Goban çizgileri ── */
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(100,110,100,.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(100,110,100,.06) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .page {
            position: relative; z-index: 1;
            height: 100vh;
            display: flex; flex-direction: column;
            padding: 13px; gap: 10px;
        }

        /* ════════════════════════════════
           HEADER
        ════════════════════════════════ */
        header {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; height: 56px;
            background: var(--glass-dark);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: var(--r3);
            box-shadow: var(--sh2), inset 0 1px 0 var(--nm-light);
            animation: fadeDown .5s ease both;
        }

        .hdr-left { display: flex; align-items: center; gap: 14px; }

        .back-link {
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--border);
            box-shadow: var(--nm-box);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text2); font-size: .85rem;
            transition: all .22s;
        }
        .back-link:hover {
            background: var(--jade-glass);
            border-color: var(--border-jade);
            color: var(--jade-bright);
            box-shadow: var(--sh-jade), inset 0 1px 0 var(--nm-light);
            transform: translateY(-1px);
        }
        .back-link:active {
            box-shadow: var(--nm-press);
            transform: translateY(0) scale(.96);
        }

        .hdr-sep { width: 1px; height: 20px; background: var(--border); }

        #chapter-tag {
            display: block; font-size: .62rem; font-weight: 700;
            letter-spacing: .18em; text-transform: uppercase;
            color: var(--jade-mid); margin-bottom: 2px;
        }
        #lesson-title {
            font-size: .96rem; font-weight: 600; color: var(--text);
            letter-spacing: -.01em;
        }

        .prog-wrap { display: flex; align-items: center; gap: 10px; }
        #prog-text {
            font-size: .68rem; font-weight: 600; color: var(--text2);
            font-family: 'JetBrains Mono', monospace;
            min-width: 36px; text-align: right;
        }
        .prog-track {
            width: 90px; height: 5px; border-radius: 5px;
            background: var(--bg3);
            box-shadow: var(--nm-inset);
            overflow: hidden;
        }
        #prog-fill {
            height: 100%; width: 0%; border-radius: 5px;
            background: linear-gradient(90deg, var(--jade), var(--jade-bright));
            transition: width .6s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 0 8px var(--jade-glow);
        }

        /* ════════════════════════════════
           MAIN
        ════════════════════════════════ */
        .main-wrap {
            flex: 1; min-height: 0;
            display: flex; gap: 10px;
            animation: fadeUp .5s .1s ease both;
        }

        /* ════════════════════════════════
           SIDEBAR
        ════════════════════════════════ */
        .sidebar {
            width: 200px; flex-shrink: 0;
            background: var(--glass-dark);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: var(--r);
            box-shadow: var(--sh2), inset 0 1px 0 var(--nm-light);
            display: flex; flex-direction: column; overflow: hidden;
            transition: box-shadow .3s, transform .3s;
        }
        .sidebar:hover {
            box-shadow: var(--sh3), inset 0 1px 0 var(--nm-light);
        }

        .sidebar-hdr {
            padding: 14px 15px 10px;
            font-size: .56rem; font-weight: 700;
            letter-spacing: .22em; text-transform: uppercase;
            color: var(--text3); flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,.15);
        }

        #curriculum { flex: 1; overflow-y: auto; padding: 7px; }
        #curriculum::-webkit-scrollbar { width: 3px; }
        #curriculum::-webkit-scrollbar-thumb { background: var(--border-jade); border-radius: 3px; }

        .chapter { margin-bottom: 3px; }

        .chapter-title {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; border-radius: var(--r2);
            font-size: .8rem; font-weight: 600; cursor: pointer;
            color: var(--text2); transition: all .2s; user-select: none;
            border: 1px solid transparent;
        }
        .chapter-title:hover {
            background: var(--glass-light);
            border-color: var(--border);
            color: var(--text);
        }
        .ch-left { display: flex; align-items: center; gap: 8px; }
        .ch-num {
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--border-jade);
            color: var(--jade-mid); font-size: .58rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            box-shadow: var(--sh1);
            transition: all .2s;
        }
        .chapter-title:hover .ch-num {
            background: var(--jade-glass);
            box-shadow: 0 0 10px var(--jade-glow);
            color: var(--jade-bright);
        }
        .ch-arrow { font-size: .56rem; color: var(--text3); transition: transform .2s; }
        .chapter-title.open .ch-arrow { transform: rotate(90deg); }

        .lesson-list { display: none; flex-direction: column; padding: 2px 0 2px 5px; }
        .lesson-list.open { display: flex; }

        .lesson-item {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 10px; margin: 1px 0;
            border-radius: 10px; cursor: pointer;
            font-size: .79rem; color: var(--text2);
            border: 1px solid transparent;
            transition: all .2s;
        }
        .lesson-item:hover {
            background: var(--glass-light);
            border-color: var(--border);
            color: var(--text);
            transform: translateX(3px);
        }
        .lesson-item.active {
            background: var(--jade-frost);
            backdrop-filter: blur(8px);
            border-color: var(--border-jade);
            color: var(--jade-bright); font-weight: 600;
            box-shadow: var(--sh-jade), inset 0 1px 0 var(--nm-light);
            transform: translateX(3px);
        }
        .lesson-item.done { color: var(--jade); }
        .lesson-item.done .li-check { display: inline; color: var(--jade-mid); }
        .li-check { display: none; font-size: .58rem; }
        .li-num { font-size: .58rem; opacity: .4; min-width: 18px; font-family: 'JetBrains Mono', monospace; }

        /* ════════════════════════════════
           CONTENT
        ════════════════════════════════ */
        .content-area {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column; gap: 10px;
        }

        .mid-row { flex: 1; min-height: 0; display: flex; gap: 10px; }

        /* ── TAHTA KARTI ── */
        .board-card {
            aspect-ratio: 1; max-height: 100%; flex-shrink: 0;
            background: #1a1008;
            border: 1px solid rgba(200,150,40,.2);
            border-top-color: rgba(220,170,60,.35);
            border-radius: var(--r);
            box-shadow:
                var(--sh2),
                0 0 0 4px rgba(0,0,0,.08),
                inset 0 1px 0 rgba(220,170,60,.15);
            display: flex; align-items: center; justify-content: center;
            padding: 14px; overflow: hidden; position: relative;
            transition: box-shadow .3s, transform .3s;
        }
        .board-card:hover {
            box-shadow:
                var(--sh3),
                0 0 40px rgba(190,140,30,.12),
                inset 0 1px 0 rgba(220,170,60,.15);
        }

        #goban { max-width: 100%; max-height: 100%; display: block; touch-action: none; position: relative; z-index: 1; }

        /* ── AÇIKLAMA KARTI ── */
        .info-card {
            flex: 1; min-width: 0;
            background: var(--glass-mid);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: var(--r);
            box-shadow:
                var(--sh2),
                inset 0 1px 0 var(--nm-light),
                inset 1px 0 0 var(--nm-light);
            padding: 22px 24px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: .85rem;
            position: relative;
            transition: box-shadow .3s, transform .3s;
        }
        .info-card:hover {
            box-shadow:
                var(--sh3),
                0 0 30px var(--jade-glow),
                inset 0 1px 0 var(--nm-light);
        }
        .info-card::-webkit-scrollbar { width: 3px; }
        .info-card::-webkit-scrollbar-thumb { background: var(--border-jade); border-radius: 3px; }

        /* Üst parlak çizgi */
        .info-card::after {
            content: '';
            position: absolute; top: 0; left: 25%; right: 20%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.1), transparent);
        }

        #lesson-body {
            font-size: .97rem; line-height: 1.9; color: var(--text2);
            position: relative; z-index: 1;
        }
        #lesson-body p { margin: 0 0 .85rem; }
        #lesson-body p:last-child { margin-bottom: 0; }
        #lesson-body strong { color: var(--text); font-weight: 600; }
        #lesson-body em { color: var(--text-accent); font-style: normal; }
        #lesson-body ul, #lesson-body ol {
            margin: .35rem 0 .85rem 1.3rem; line-height: 2;
            font-size: .93rem; color: var(--text2);
        }

        .highlight {
            background: var(--jade-glass);
            backdrop-filter: blur(8px);
            border-left: 2px solid var(--jade-mid);
            padding: 13px 17px; margin: .6rem 0;
            border-radius: 0 10px 10px 0;
            font-size: .92rem; line-height: 1.75; color: var(--text);
            box-shadow: inset 0 1px 0 var(--nm-light), var(--sh1);
            position: relative; z-index: 1;
        }

        .term {
            display: inline-block;
            background: var(--bg3);
            border: 1px solid var(--border-jade);
            border-radius: 6px; padding: .07rem .42rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: .82rem; color: var(--jade-bright); font-weight: 500;
            box-shadow: var(--sh1);
            position: relative; z-index: 1;
        }

        /* ════════════════════════════════
           FOOTER
        ════════════════════════════════ */
        .footer-bar {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; height: 52px;
            background: var(--glass-dark);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: var(--r3);
            box-shadow: var(--sh2), inset 0 1px 0 var(--nm-light);
        }

        /* feedback */
        .feedback-box {
            display: flex; align-items: center; gap: 8px;
            font-size: .87rem; font-weight: 500;
            padding: 6px 14px; border-radius: 30px;
            transition: all .28s;
        }
        .feedback-box.info {
            color: var(--text2); background: transparent;
        }
        .feedback-box.correct {
            color: var(--jade-bright);
            background: var(--jade-frost);
            border: 1px solid var(--border-jade);
            box-shadow: 0 0 14px var(--jade-glow);
        }
        .feedback-box.wrong {
            color: #e07d6a;
            background: rgba(224,125,106,.1);
            border: 1px solid rgba(224,125,106,.2);
        }
        .feedback-box .fb-icon { font-size: .9rem; }

        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
        }
        .shake { animation: shake .3s ease; }

        .nav-right { display: flex; align-items: center; gap: 10px; }

        #step-dots { display: flex; gap: 5px; align-items: center; }
        .sdot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--bg4);
            box-shadow: var(--sh1);
            cursor: pointer; transition: all .22s;
        }
        .sdot:hover { background: var(--jade); transform: scale(1.2); }
        .sdot.active {
            background: var(--jade-bright); transform: scale(1.5);
            box-shadow: 0 0 8px var(--jade-glow);
        }
        .sdot.done { background: var(--jade); }

        #step-counter {
            font-size: .65rem; font-weight: 600; color: var(--text3);
            font-family: 'JetBrains Mono', monospace; min-width: 46px;
        }

        .nav-sep { width: 1px; height: 18px; background: var(--border); }

        .nav-btn {
            border: none; height: 34px; padding: 0 18px; border-radius: 34px;
            font-family: inherit; font-size: .83rem; font-weight: 500;
            cursor: pointer; transition: all .22s;
            display: flex; align-items: center; gap: 5px;
        }

        #btn-prev {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            box-shadow: var(--nm-box);
        }
        #btn-prev:hover {
            background: var(--glass-light);
            border-color: var(--border-jade);
            color: var(--text);
            transform: translateY(-1px);
        }
        #btn-prev:active {
            box-shadow: var(--nm-press);
            transform: translateY(0);
        }

        #btn-next {
            background: linear-gradient(135deg, var(--jade) 0%, var(--jade-mid) 100%);
            color: #fff; font-weight: 600;
            border: 1px solid var(--border-jade);
            box-shadow: 0 4px 16px rgba(77,155,116,.35), inset 0 1px 0 rgba(255,255,255,.12);
        }
        #btn-next:hover {
            background: linear-gradient(135deg, var(--jade-mid) 0%, var(--jade-bright) 100%);
            box-shadow: 0 8px 28px rgba(77,155,116,.45), 0 0 20px rgba(77,155,116,.2), inset 0 1px 0 rgba(255,255,255,.15);
            transform: translateY(-2px);
        }
        #btn-next:active {
            transform: translateY(0) scale(.97);
            box-shadow: var(--sh1);
        }

        button:disabled { opacity: .2; cursor: not-allowed; pointer-events: none; }

        /* ════════════════════════════════
           MODAL
        ════════════════════════════════ */
        #complete-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(10,14,11,.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: none; align-items: center; justify-content: center;
        }
        #complete-screen.show { display: flex; }

        .modal {
            background: var(--glass-dark);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: 26px; padding: 40px 44px; text-align: center;
            box-shadow: var(--sh3), 0 0 60px rgba(77,155,116,.12), inset 0 1px 0 var(--nm-light);
            max-width: 360px; width: 100%;
            animation: popIn .38s cubic-bezier(.34,1.56,.64,1) both;
        }
        .modal-icon { font-size: 2.8rem; margin-bottom: 14px; }
        .modal h2 {
            font-size: 1.22rem; font-weight: 700; color: var(--text);
            margin: 0 0 10px; letter-spacing: -.02em;
        }
        #complete-msg {
            font-size: .86rem; color: var(--text2); line-height: 1.7; margin: 0 0 24px;
        }
        .modal-btn {
            background: linear-gradient(135deg, var(--jade), var(--jade-mid));
            color: #fff; border: 1px solid var(--border-jade);
            padding: 11px 28px; border-radius: 30px;
            font-family: inherit; font-size: .83rem; font-weight: 600;
            cursor: pointer; transition: all .22s;
            box-shadow: 0 4px 16px rgba(77,155,116,.3);
        }
        .modal-btn:hover {
            background: linear-gradient(135deg, var(--jade-mid), var(--jade-bright));
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(77,155,116,.4);
        }
        .modal-btn:active { transform: scale(.97); }

        /* ── ANİMASYONLAR ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(.84) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media(max-width: 820px) {
            .sidebar { display: none; }
            .mid-row { flex-direction: column; }
            .board-card { aspect-ratio: auto; width: 100%; max-height: 280px; }
        }
    </style>
</head>
<body>
<div class="page">

    <header>
        <div class="hdr-left">
            <a href="index.html" class="back-link">←</a>
            <div class="hdr-sep"></div>
            <div>
                <span id="chapter-tag">Yükleniyor…</span>
                <div id="lesson-title">Go Öğren</div>
            </div>
        </div>
        <div class="prog-wrap">
            <span id="prog-text">0/0</span>
            <div class="prog-track"><div id="prog-fill"></div></div>
        </div>
    </header>

    <div class="main-wrap">
        <aside class="sidebar">
            <div class="sidebar-hdr">Müfredat</div>
            <div id="curriculum"></div>
        </aside>

        <main class="content-area">
            <div class="mid-row">
                <div class="board-card">
                    <canvas id="goban"></canvas>
                </div>
                <div class="info-card">
                    <div id="lesson-body"></div>
                </div>
            </div>

            <div class="footer-bar">
                <div id="feedback" class="feedback-box info">
                    <span class="fb-icon">💡</span>
                    <span id="fb-text">Yükleniyor…</span>
                </div>
                <div class="nav-right">
                    <div id="step-dots"></div>
                    <span id="step-counter">1 / 1</span>
                    <div class="nav-sep"></div>
                    <button id="btn-prev" class="nav-btn" onclick="prevStep()">← Geri</button>
                    <button id="btn-next" class="nav-btn" onclick="nextStep()">İleri →</button>
                </div>
            </div>
        </main>
    </div>

    <div id="complete-screen">
        <div class="modal">
            <div class="modal-icon">🎊</div>
            <h2>Tebrikler!</h2>
            <p id="complete-msg"></p>
            <button class="modal-btn" onclick="closeComplete()">Devam Et →</button>
        </div>
    </div>

    <script src="ogren.js"></script>
</div>

<script>
/* Fare hareketine göre 3D tilt efekti — sadece info card ve sidebar */
document.querySelectorAll('.info-card, .sidebar').forEach(el => {
    el.addEventListener('mousemove', e => {
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - .5;
        const y = (e.clientY - r.top)  / r.height - .5;
        el.style.transform = `perspective(900px) rotateY(${x * 2.5}deg) rotateX(${-y * 2.5}deg) translateZ(4px)`;
    });
    el.addEventListener('mouseleave', () => {
        el.style.transform = '';
        el.style.transition = 'transform .5s ease, box-shadow .3s';
    });
    el.addEventListener('mouseenter', () => {
        el.style.transition = 'transform .12s ease, box-shadow .3s';
    });
});
</script>
</body>
</html>
