<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Öğren – Antalya GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ── Zemin: sıcak krem/bej ── */
            --bg:           #f2ede6;
            --bg-l:         #f8f5f0;
            --bg-d:         #e8e2da;
            --bg2:          #f5f0e8;
            --bg3:          #ece6de;
            --bg4:          #e4ddd4;

            /* ── Altın aksan ── */
            --gold:         #a07828;
            --gold2:        #c8a84b;
            --gold-glow:    rgba(160,120,40,.2);
            --gold-glass:   rgba(200,168,75,.12);
            --gold-frost:   rgba(200,168,75,.18);
            --gold-border:  rgba(160,120,40,.3);

            --jade:         #a07828;
            --jade-mid:     #b89038;
            --jade-bright:  #c8a84b;
            --jade-glow:    rgba(160,120,40,.2);
            --jade-glass:   rgba(200,168,75,.1);
            --jade-frost:   rgba(200,168,75,.14);

            /* ── Neumorphic gölgeler — açık zemin ── */
            --sh-l:         rgba(255,252,246,0.98);
            --sh-d:         rgba(168,158,140,0.65);
            --nm-box:       5px 5px 12px var(--sh-d), -5px -5px 12px var(--sh-l);
            --nm-inset:     inset 4px 4px 9px var(--sh-d), inset -4px -4px 9px var(--sh-l);
            --nm-press:     inset 3px 3px 7px var(--sh-d), inset -3px -3px 7px var(--sh-l);
            --nm-light:     rgba(255,252,246,0.95);
            --nm-shadow:    rgba(168,158,140,0.55);

            /* ── Glass yüzeyler ── */
            --glass-dark:   rgba(240,235,226,.88);
            --glass-mid:    rgba(245,240,232,.85);
            --glass-light:  rgba(250,246,238,.8);

            /* ── Metin — yüksek kontrast ── */
            --text:         #1e1a12;
            --text2:        #4a4032;
            --text3:        #8a7e6a;
            --text-accent:  #8a6418;

            /* ── Kenarlık ── */
            --border:       rgba(0,0,0,.09);
            --border-jade:  rgba(160,120,40,.3);
            --border-top:   rgba(255,255,255,.9);

            /* ── Gölgeler ── */
            --sh1:  0 2px 6px rgba(0,0,0,.1);
            --sh2:  5px 5px 12px var(--sh-d), -5px -5px 12px var(--sh-l);
            --sh3:  8px 8px 20px var(--sh-d), -8px -8px 20px var(--sh-l);
            --sh-jade: 0 4px 16px rgba(160,120,40,.18);

            /* ── Blur ── */
            --blur:  blur(24px);
            --blur2: blur(40px);

            /* ── Radius ── */
            --r:  20px;
            --r2: 12px;
            --r3: 30px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Altın grid zemin — index.html ile aynı ── */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(160,120,40,.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(160,120,40,.05) 1px, transparent 1px);
            background-size: 44px 44px;
        }

        body::after { content: none; }

        .page {
            position: relative; z-index: 1;
            height: 100vh;
            display: flex; flex-direction: column;
            padding: 13px; gap: 10px;
        }

        /* ════════════════════════════════
           HEADER
        ════════════════════════════════ */
        header {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; height: 56px;
            background: var(--glass-dark);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: var(--r3);
            box-shadow: var(--sh2), inset 0 1px 0 var(--nm-light);
            animation: fadeDown .5s ease both;
        }

        .hdr-left { display: flex; align-items: center; gap: 14px; }

        .back-link {
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--border);
            box-shadow: var(--nm-box);
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text2); font-size: .85rem;
            transition: all .22s;
        }
        .back-link:hover {
            background: var(--jade-glass);
            border-color: var(--border-jade);
            color: var(--jade-bright);
            box-shadow: var(--sh-jade), inset 0 1px 0 var(--nm-light);
            transform: translateY(-1px);
        }
        .back-link:active {
            box-shadow: var(--nm-press);
            transform: translateY(0) scale(.96);
        }

        .hdr-sep { width: 1px; height: 20px; background: var(--border); }

        #chapter-tag {
            display: block; font-size: .62rem; font-weight: 700;
            letter-spacing: .18em; text-transform: uppercase;
            color: var(--jade-mid); margin-bottom: 2px;
        }
        #lesson-title {
            font-size: .96rem; font-weight: 600; color: var(--text);
            letter-spacing: -.01em;
        }

        .prog-wrap { display: flex; align-items: center; gap: 10px; }
        #prog-text {
            font-size: .68rem; font-weight: 600; color: var(--text2);
            font-family: 'JetBrains Mono', monospace;
            min-width: 36px; text-align: right;
        }
        .prog-track {
            width: 90px; height: 5px; border-radius: 5px;
            background: var(--bg3);
            box-shadow: var(--nm-inset);
            overflow: hidden;
        }
        #prog-fill {
            height: 100%; width: 0%; border-radius: 5px;
            background: linear-gradient(90deg, var(--jade), var(--jade-bright));
            transition: width .6s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 0 8px var(--jade-glow);
        }

        /* ════════════════════════════════
           MAIN
        ════════════════════════════════ */
        .main-wrap {
            flex: 1; min-height: 0;
            display: flex; gap: 10px;
            animation: fadeUp .5s .1s ease both;
        }

        /* ════════════════════════════════
           SIDEBAR
        ════════════════════════════════ */
        .sidebar {
            width: 220px; flex-shrink: 0;
            background: var(--glass-dark);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: var(--r);
            box-shadow: var(--sh2), inset 0 1px 0 var(--nm-light);
            display: flex; flex-direction: column; overflow: hidden;
            transition: box-shadow .3s, transform .3s;
        }
        .sidebar:hover {
            box-shadow: var(--sh3), inset 0 1px 0 var(--nm-light);
        }

        .sidebar-hdr {
            padding: 14px 16px 11px;
            font-size: .65rem; font-weight: 700;
            letter-spacing: .18em; text-transform: uppercase;
            color: var(--text2); flex-shrink: 0;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,.04);
        }

        #curriculum { flex: 1; overflow-y: auto; padding: 8px; }
        #curriculum::-webkit-scrollbar { width: 3px; }
        #curriculum::-webkit-scrollbar-thumb { background: var(--border-jade); border-radius: 3px; }

        .chapter { margin-bottom: 4px; }

        .chapter-title {
            display: flex; align-items: center; justify-content: space-between;
            padding: 9px 11px; border-radius: var(--r2);
            font-size: .86rem; font-weight: 600; cursor: pointer;
            color: var(--text); transition: all .2s; user-select: none;
            border: 1px solid transparent;
        }
        .chapter-title:hover {
            background: var(--glass-light);
            border-color: var(--border);
            color: var(--text);
        }
        .ch-left { display: flex; align-items: center; gap: 9px; }
        .ch-num {
            width: 20px; height: 20px; border-radius: 50%;
            background: var(--bg3);
            border: 1px solid var(--border-jade);
            color: var(--jade-mid); font-size: .64rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
            box-shadow: var(--sh1);
            transition: all .2s;
        }
        .chapter-title:hover .ch-num {
            background: var(--jade-glass);
            box-shadow: 0 0 10px var(--jade-glow);
            color: var(--jade-bright);
        }
        .ch-arrow { font-size: .6rem; color: var(--text3); transition: transform .2s; }
        .chapter-title.open .ch-arrow { transform: rotate(90deg); }

        .lesson-list { display: none; flex-direction: column; padding: 2px 0 3px 6px; }
        .lesson-list.open { display: flex; }

        .lesson-item {
            display: flex; align-items: center; gap: 7px;
            padding: 8px 11px; margin: 1px 0;
            border-radius: 10px; cursor: pointer;
            font-size: .84rem; color: var(--text2);
            border: 1px solid transparent;
            transition: all .2s;
        }
        .lesson-item:hover {
            background: var(--glass-light);
            border-color: var(--border);
            color: var(--text);
            transform: translateX(3px);
        }
        .lesson-item.active {
            background: var(--jade-frost);
            backdrop-filter: blur(8px);
            border-color: var(--border-jade);
            color: var(--jade-bright); font-weight: 600;
            box-shadow: var(--sh-jade), inset 0 1px 0 var(--nm-light);
            transform: translateX(3px);
        }
        .lesson-item.done { color: var(--jade); }
        .lesson-item.done .li-check { display: inline; color: var(--jade-mid); }
        .li-check { display: none; font-size: .65rem; }
        .li-num { font-size: .65rem; opacity: .45; min-width: 20px; font-family: 'JetBrains Mono', monospace; }

        /* ════════════════════════════════
           CONTENT
        ════════════════════════════════ */
        .content-area {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column; gap: 10px;
        }

        .mid-row { flex: 1; min-height: 0; display: flex; gap: 10px; }

        /* ── TAHTA KARTI ── */
        .board-card {
            aspect-ratio: 1; max-height: 100%; flex-shrink: 0;
            background: #f2e8d0;
            border: 1px solid rgba(160,120,50,.22);
            border-top-color: rgba(255,248,220,.9);
            border-radius: var(--r);
            box-shadow: var(--sh2), inset 0 1px 0 rgba(255,252,235,.8);
            display: flex; align-items: center; justify-content: center;
            padding: 14px; overflow: hidden; position: relative;
            transition: box-shadow .3s, transform .3s;
        }
        .board-card:hover {
            box-shadow: var(--sh3), 0 0 30px rgba(160,120,50,.1), inset 0 1px 0 rgba(255,252,235,.8);
        }

        #goban { max-width: 100%; max-height: 100%; display: block; touch-action: none; position: relative; z-index: 1; }

        /* ── AÇIKLAMA KARTI ── */
        .info-card {
            flex: 1; min-width: 0;
            background: var(--glass-mid);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: var(--r);
            box-shadow:
                var(--sh2),
                inset 0 1px 0 var(--nm-light),
                inset 1px 0 0 var(--nm-light);
            padding: 22px 24px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: .85rem;
            position: relative;
            transition: box-shadow .3s, transform .3s;
        }
        .info-card:hover {
            box-shadow:
                var(--sh3),
                0 0 30px var(--jade-glow),
                inset 0 1px 0 var(--nm-light);
        }
        .info-card::-webkit-scrollbar { width: 3px; }
        .info-card::-webkit-scrollbar-thumb { background: var(--border-jade); border-radius: 3px; }

        /* Üst parlak çizgi */
        .info-card::after {
            content: '';
            position: absolute; top: 0; left: 25%; right: 20%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.7), transparent);
        }

        #lesson-body {
            font-size: 1rem; line-height: 1.95; color: var(--text);
            position: relative; z-index: 1;
        }
        #lesson-body p { margin: 0 0 .9rem; }
        #lesson-body p:last-child { margin-bottom: 0; }
        #lesson-body strong { color: var(--text); font-weight: 700; }
        #lesson-body em { color: var(--text-accent); font-style: normal; font-weight: 500; }
        #lesson-body ul, #lesson-body ol {
            margin: .35rem 0 .9rem 1.3rem; line-height: 2.05;
            font-size: .96rem; color: var(--text);
        }

        .highlight {
            background: var(--jade-glass);
            backdrop-filter: blur(8px);
            border-left: 2px solid var(--jade-mid);
            padding: 13px 17px; margin: .6rem 0;
            border-radius: 0 10px 10px 0;
            font-size: .92rem; line-height: 1.75; color: var(--text);
            box-shadow: inset 0 1px 0 var(--nm-light), var(--sh1);
            position: relative; z-index: 1;
        }

        .term {
            display: inline-block;
            background: var(--bg3);
            border: 1px solid var(--border-jade);
            border-radius: 6px; padding: .07rem .42rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: .82rem; color: var(--jade-bright); font-weight: 500;
            box-shadow: var(--sh1);
            position: relative; z-index: 1;
        }

        /* ════════════════════════════════
           FOOTER
        ════════════════════════════════ */
        .footer-bar {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; height: 52px;
            background: var(--glass-dark);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: var(--r3);
            box-shadow: var(--sh2), inset 0 1px 0 var(--nm-light);
        }

        /* feedback */
        .feedback-box {
            display: flex; align-items: center; gap: 8px;
            font-size: .87rem; font-weight: 500;
            padding: 6px 14px; border-radius: 30px;
            transition: all .28s;
        }
        .feedback-box.info {
            color: var(--text2); background: transparent;
        }
        .feedback-box.correct {
            color: var(--jade-bright);
            background: var(--jade-frost);
            border: 1px solid var(--border-jade);
            box-shadow: 0 0 14px var(--jade-glow);
        }
        .feedback-box.wrong {
            color: #e07d6a;
            background: rgba(224,125,106,.1);
            border: 1px solid rgba(224,125,106,.2);
        }
        .feedback-box .fb-icon { font-size: .9rem; }

        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
        }
        .shake { animation: shake .3s ease; }

        .nav-right { display: flex; align-items: center; gap: 10px; }

        #step-dots { display: flex; gap: 5px; align-items: center; }
        .sdot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--bg4);
            box-shadow: var(--sh1);
            cursor: pointer; transition: all .22s;
        }
        .sdot:hover { background: var(--jade); transform: scale(1.2); }
        .sdot.active {
            background: var(--jade-bright); transform: scale(1.5);
            box-shadow: 0 0 8px var(--jade-glow);
        }
        .sdot.done { background: var(--jade); }

        #step-counter {
            font-size: .65rem; font-weight: 600; color: var(--text3);
            font-family: 'JetBrains Mono', monospace; min-width: 46px;
        }

        .nav-sep { width: 1px; height: 18px; background: var(--border); }

        .nav-btn {
            border: none; height: 34px; padding: 0 18px; border-radius: 34px;
            font-family: inherit; font-size: .83rem; font-weight: 500;
            cursor: pointer; transition: all .22s;
            display: flex; align-items: center; gap: 5px;
        }

        #btn-prev {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            box-shadow: var(--nm-box);
        }
        #btn-prev:hover {
            background: var(--glass-light);
            border-color: var(--border-jade);
            color: var(--text);
            transform: translateY(-1px);
        }
        #btn-prev:active {
            box-shadow: var(--nm-press);
            transform: translateY(0);
        }

        #btn-next {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
            color: #fff; font-weight: 600;
            border: 1px solid var(--gold-border);
            box-shadow: 0 4px 14px rgba(160,120,40,.3), inset 0 1px 0 rgba(255,255,255,.2);
        }
        #btn-next:hover {
            background: linear-gradient(135deg, var(--gold2) 0%, #d4b455 100%);
            box-shadow: 0 8px 24px rgba(160,120,40,.38), inset 0 1px 0 rgba(255,255,255,.25);
            transform: translateY(-2px);
        }
        #btn-next:active {
            transform: translateY(0) scale(.97);
            box-shadow: var(--sh1);
        }

        button:disabled { opacity: .25; cursor: not-allowed; pointer-events: none; }

        /* ════════════════════════════════
           MODAL
        ════════════════════════════════ */
        #complete-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(242,237,230,.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: none; align-items: center; justify-content: center;
        }
        #complete-screen.show { display: flex; }

        .modal {
            background: var(--glass-dark);
            backdrop-filter: var(--blur2);
            -webkit-backdrop-filter: var(--blur2);
            border: 1px solid var(--border);
            border-top-color: var(--border-top);
            border-radius: 26px; padding: 40px 44px; text-align: center;
            box-shadow: var(--sh3), 0 0 60px rgba(77,155,116,.12), inset 0 1px 0 var(--nm-light);
            max-width: 360px; width: 100%;
            animation: popIn .38s cubic-bezier(.34,1.56,.64,1) both;
        }
        .modal-icon { font-size: 2.8rem; margin-bottom: 14px; }
        .modal h2 {
            font-size: 1.22rem; font-weight: 700; color: var(--text);
            margin: 0 0 10px; letter-spacing: -.02em;
        }
        #complete-msg {
            font-size: .86rem; color: var(--text2); line-height: 1.7; margin: 0 0 24px;
        }
        .modal-btn {
            background: linear-gradient(135deg, var(--jade), var(--jade-mid));
            color: #fff; border: 1px solid var(--border-jade);
            padding: 11px 28px; border-radius: 30px;
            font-family: inherit; font-size: .83rem; font-weight: 600;
            cursor: pointer; transition: all .22s;
            box-shadow: 0 4px 16px rgba(77,155,116,.3);
        }
        .modal-btn:hover {
            background: linear-gradient(135deg, var(--jade-mid), var(--jade-bright));
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(77,155,116,.4);
        }
        .modal-btn:active { transform: scale(.97); }

        /* ── ANİMASYONLAR ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(.84) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        @media(max-width: 820px) {
            .sidebar { display: none; }
            .mid-row { flex-direction: column; }
            .board-card { aspect-ratio: auto; width: 100%; max-height: 280px; }
        }
    </style>
</head>
<body>
<div class="page">

    <header>
        <div class="hdr-left">
            <a href="index.html" class="back-link">←</a>
            <div class="hdr-sep"></div>
            <div>
                <span id="chapter-tag">Yükleniyor…</span>
                <div id="lesson-title">Go Öğren</div>
            </div>
        </div>
        <div class="prog-wrap">
            <span id="prog-text">0/0</span>
            <div class="prog-track"><div id="prog-fill"></div></div>
        </div>
    </header>

    <div class="main-wrap">
        <aside class="sidebar">
            <div class="sidebar-hdr">Müfredat</div>
            <div id="curriculum"></div>
        </aside>

        <main class="content-area">
            <div class="mid-row">
                <div class="board-card">
                    <canvas id="goban"></canvas>
                </div>
                <div class="info-card">
                    <div id="lesson-body"></div>
                </div>
            </div>

            <div class="footer-bar">
                <div id="feedback" class="feedback-box info">
                    <span class="fb-icon">💡</span>
                    <span id="fb-text">Yükleniyor…</span>
                </div>
                <div class="nav-right">
                    <div id="step-dots"></div>
                    <span id="step-counter">1 / 1</span>
                    <div class="nav-sep"></div>
                    <button id="btn-prev" class="nav-btn" onclick="prevStep()">← Geri</button>
                    <button id="btn-next" class="nav-btn" onclick="nextStep()">İleri →</button>
                </div>
            </div>
        </main>
    </div>

    <div id="complete-screen">
        <div class="modal">
            <div class="modal-icon">🎊</div>
            <h2>Tebrikler!</h2>
            <p id="complete-msg"></p>
            <button class="modal-btn" onclick="closeComplete()">Devam Et →</button>
        </div>
    </div>

    <script src="ogren.js"></script>
</div>

<script>
/* Fare hareketine göre 3D tilt efekti — sadece info card ve sidebar */
document.querySelectorAll('.info-card, .sidebar').forEach(el => {
    el.addEventListener('mousemove', e => {
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - .5;
        const y = (e.clientY - r.top)  / r.height - .5;
        el.style.transform = `perspective(900px) rotateY(${x * 2.5}deg) rotateX(${-y * 2.5}deg) translateZ(4px)`;
    });
    el.addEventListener('mouseleave', () => {
        el.style.transform = '';
        el.style.transition = 'transform .5s ease, box-shadow .3s';
    });
    el.addEventListener('mouseenter', () => {
        el.style.transition = 'transform .12s ease, box-shadow .3s';
    });
});
</script>
</body>
</html>
