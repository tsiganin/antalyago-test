<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go Öğren 3D – Antalya GO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:   #c8a84b;
      --gold2:  #e0c060;
      --dark:   #08080e;
      --glass:  rgba(10,10,18,.88);
      --gborder:rgba(200,168,75,.22);
      --text:   #e8e4de;
      --muted:  rgba(232,228,222,.45);
      --green:  #3ecf80;
      --red:    #e05050;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { background: var(--dark); overflow: hidden; font-family: 'Noto Sans', sans-serif; color: var(--text); }

    /* ── CANVAS ── */
    #c { position: fixed; inset: 0; z-index: 0; display: block; }

    /* ── TOPBAR ── */
    #topbar {
      position: fixed; top: 0; left: 0; right: 0; height: 46px; z-index: 30;
      background: var(--glass); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--gborder);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem; gap: 1rem;
    }
    .tb-left { display: flex; align-items: center; gap: .7rem; }
    .back-btn {
      color: var(--gold); font-size: 11px; letter-spacing: .07em;
      text-decoration: none; padding: 5px 12px; border: 1px solid var(--gborder);
      border-radius: 6px; transition: all .18s;
    }
    .back-btn:hover { background: var(--gold); color: var(--dark); }
    .page-title { font-family: 'Noto Serif', serif; font-size: 1rem; font-weight: 700; letter-spacing: .06em; }
    .prog-wrap { display: flex; align-items: center; gap: .6rem; }
    .prog-text { font-size: 11px; color: var(--muted); font-weight: 600; }
    .prog-track { width: 120px; height: 5px; background: rgba(200,168,75,.12); border: 1px solid var(--gborder); border-radius: 3px; overflow: hidden; }
    .prog-fill  { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 3px; transition: width .5s; }
    .lang-switcher { display:flex; gap:.3rem; align-items:center; }
    .lang-btn { padding:3px 8px; font-size:.7rem; font-weight:700; letter-spacing:.04em; border:1px solid var(--gborder); border-radius:4px; background:transparent; color:var(--muted); cursor:pointer; transition:all .15s; }
    .lang-btn:hover { border-color:var(--gold); color:var(--gold); }
    .lang-btn.active { background:var(--gold); color:var(--dark); border-color:var(--gold); }

    /* ── SIDEBAR ── */
    #sidebar {
      position: fixed; top: 46px; left: 0; bottom: 0; width: 218px; z-index: 20;
      background: var(--glass); backdrop-filter: blur(16px);
      border-right: 1px solid var(--gborder); overflow-y: auto;
      transition: transform .3s ease;
    }
    #sidebar.collapsed { transform: translateX(-218px); }
    .sb-header {
      padding: .7rem 1rem; border-bottom: 1px solid var(--gborder);
      font-size: .7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--gold);
    }
    .chapter { border-bottom: 1px solid var(--gborder); }
    .ch-title {
      display: flex; align-items: center; justify-content: space-between;
      padding: .55rem 1rem; font-size: .75rem; font-weight: 700;
      cursor: pointer; user-select: none; transition: background .12s;
      background: rgba(200,168,75,.04);
    }
    .ch-title:hover { background: rgba(200,168,75,.10); }
    .ch-left { display: flex; align-items: center; gap: .45rem; }
    .ch-num {
      width: 18px; height: 18px; border-radius: 50%; background: var(--gold);
      color: var(--dark); font-size: .6rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .ch-arrow { font-size: .6rem; color: var(--muted); transition: transform .2s; }
    .ch-title.open .ch-arrow { transform: rotate(90deg); }
    .lesson-list { display: none; flex-direction: column; }
    .lesson-list.open { display: flex; }
    .lesson-item {
      display: flex; align-items: center; gap: .4rem;
      padding: .42rem .9rem .42rem 1.3rem;
      font-size: .72rem; cursor: pointer; transition: background .12s;
      color: var(--muted); border-left: 2px solid transparent;
    }
    .lesson-item:hover { background: rgba(200,168,75,.07); color: var(--text); }
    .lesson-item.active { background: rgba(200,168,75,.13); color: var(--text); font-weight: 600; border-left-color: var(--gold); }
    .lesson-item.done { color: rgba(62,207,128,.7); }
    .li-check { display: none; font-size: .62rem; }
    .lesson-item.done .li-check { display: inline; }
    .li-num { font-size: .6rem; color: var(--muted); min-width: 22px; }
    #sidebar::-webkit-scrollbar { width: 3px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--gborder); border-radius: 3px; }

    /* ── SIDEBAR TOGGLE ── */
    #sb-toggle {
      position: fixed; top: 56px; left: 218px; z-index: 25;
      width: 18px; height: 36px; background: var(--glass);
      border: 1px solid var(--gborder); border-left: none;
      border-radius: 0 6px 6px 0; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--gold); transition: left .3s;
    }
    #sb-toggle.collapsed { left: 0; }

    /* ── LESSON PANEL ── */
    #lesson-panel {
      position: fixed; top: 46px; right: 0; width: 330px; bottom: 60px; z-index: 20;
      background: var(--glass); backdrop-filter: blur(16px);
      border-left: 1px solid var(--gborder);
      overflow-y: auto; padding: 1.4rem 1.3rem;
      display: flex; flex-direction: column; gap: .85rem;
    }
    #lesson-panel::-webkit-scrollbar { width: 3px; }
    #lesson-panel::-webkit-scrollbar-thumb { background: var(--gborder); border-radius: 3px; }
    .ch-tag { font-size: .62rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); }
    #lesson-title { font-family: 'Noto Serif', serif; font-size: 1.22rem; font-weight: 700; line-height: 1.25; }
    .step-dots { display: flex; gap: .35rem; align-items: center; }
    .sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--gborder); cursor: pointer; transition: all .25s; }
    .sdot.active { background: var(--gold); transform: scale(1.35); }
    .sdot.done   { background: rgba(62,207,128,.6); }
    #lesson-body { font-size: .86rem; line-height: 1.8; color: rgba(232,228,222,.85); flex: 1; }
    #lesson-body p { margin-bottom: .7rem; }
    #lesson-body p:last-child { margin-bottom: 0; }
    #lesson-body strong { color: var(--text); font-weight: 700; }
    #lesson-body em { font-style: italic; color: var(--gold); }
    #lesson-body ul, #lesson-body ol { margin: .3rem 0 .7rem 1.2rem; line-height: 2; font-size: .83rem; }
    .highlight-box {
      background: rgba(200,168,75,.08); border-left: 2px solid var(--gold);
      padding: .5rem .8rem; border-radius: 0 4px 4px 0;
      margin: .4rem 0; font-size: .82rem; line-height: 1.6;
    }
    .term {
      display: inline-block; background: rgba(200,168,75,.12);
      border: 1px solid var(--gborder); border-radius: 2px;
      padding: .02rem .3rem; font-family: monospace; font-size: .78rem; color: var(--gold); font-weight: 600;
    }

    /* ── FEEDBACK BOX ── */
    #feedback {
      border-radius: 5px; padding: .5rem .8rem;
      font-size: .78rem; font-weight: 600; line-height: 1.5;
      display: flex; align-items: center; gap: .45rem;
      background: rgba(200,168,75,.08); border: 1px solid var(--gborder); color: var(--muted);
      transition: all .22s;
    }
    #feedback.correct { background: rgba(62,207,128,.1);  border-color: var(--green); color: var(--green); }
    #feedback.wrong   { background: rgba(224,80,80,.1);   border-color: var(--red);   color: var(--red); }
    #feedback.info    { background: rgba(200,168,75,.08); border-color: var(--gborder); color: var(--muted); }
    .fb-icon { font-size: 1rem; flex-shrink: 0; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }
    .shake { animation: shake .3s ease; }

    /* ── NAV BAR ── */
    #nav-bar {
      position: fixed; bottom: 0; right: 0; width: 330px; height: 56px; z-index: 25;
      background: var(--glass); backdrop-filter: blur(16px);
      border-top: 1px solid var(--gborder); border-left: 1px solid var(--gborder);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
    }
    .nav-btn {
      display: flex; align-items: center; gap: .35rem;
      padding: .4rem .95rem; border: 1px solid var(--gborder); border-radius: 5px;
      background: transparent; font-family: 'Noto Sans', sans-serif;
      font-size: .78rem; font-weight: 600; cursor: pointer; color: var(--text); transition: all .15s;
    }
    .nav-btn.primary { background: rgba(200,168,75,.18); border-color: var(--gold); color: var(--gold); }
    .nav-btn.primary:hover { background: var(--gold); color: var(--dark); }
    .nav-btn:hover:not(.primary) { background: rgba(200,168,75,.08); border-color: var(--gold); }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }
    #step-counter { font-size: .7rem; color: var(--muted); font-family: monospace; }

    /* ── CANVAS NAV PILL ── */
    #canvas-nav {
      position: fixed; z-index: 16;
      display: flex; align-items: center; gap: .5rem;
      background: var(--glass); backdrop-filter: blur(14px);
      border: 1px solid var(--gborder); border-radius: 50px;
      padding: .3rem .5rem;
      /* Masaüstü: canvas sol alt */
      bottom: 16px; left: 238px;
    }
    .cc-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: transparent; border: 1px solid var(--gborder);
      color: var(--gold); font-size: 26px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .15s, transform .12s; padding-bottom: 2px;
      flex-shrink: 0;
    }
    .cc-btn:hover { background: rgba(200,168,75,.12); border-color: var(--gold); }
    .cc-btn:active { transform: scale(.9); }
    .cc-btn:disabled { opacity: .22; pointer-events: none; }
    #cc-counter {
      font-size: .72rem; color: var(--muted); font-family: monospace;
      min-width: 5.5ch; text-align: center; padding: 0 .2rem;
    }

    /* ── PANEL DRAG HANDLE ── */
    .panel-handle {
      width: 38px; height: 4px; border-radius: 2px;
      background: rgba(200,168,75,.25);
      margin: 0 auto .4rem; display: none; flex-shrink: 0;
      cursor: pointer;
    }

    /* ── MOBILE CTRL ZONE ── */
    #ctrl-zone {
      display: none;
      align-items: center; justify-content: space-between;
      gap: .5rem; flex-shrink: 0;
    }
    #mob-counter {
      font-size: .72rem; color: var(--muted); font-family: monospace;
      min-width: 5.5ch; text-align: center;
    }

    /* ── ROTATE TOGGLE ── */
    #rotate-toggle {
      position: fixed; bottom: 68px; left: 228px; z-index: 25;
      background: var(--glass); border: 1px solid var(--gborder);
      color: var(--muted); padding: 6px 10px; border-radius: 6px;
      cursor: pointer; font-size: 11px; letter-spacing: .05em;
      backdrop-filter: blur(12px); transition: all .2s;
      display: none;
    }
    #rotate-toggle.active { color: var(--gold); border-color: var(--gold); background: rgba(200,168,75,.12); }

    /* ── FEEDBACK FLASH OVERLAY ── */
    #flash {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      opacity: 0; transition: opacity .4s;
    }

    /* ── COMPLETE SCREEN ── */
    #complete-screen {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(8,8,14,.94);
      flex-direction: column; align-items: center; justify-content: center;
      gap: 1.2rem; text-align: center; padding: 2rem;
    }
    #complete-screen.show { display: flex; }
    .comp-icon  { font-size: 3.5rem; }
    .comp-title { font-family: 'Noto Serif', serif; font-size: 1.8rem; font-weight: 700; color: var(--gold); }
    .comp-sub   { font-size: .9rem; color: var(--muted); max-width: 340px; line-height: 1.7; }

    /* ── HINT ── */
    #hint {
      position: fixed; bottom: 18px; left: 228px; z-index: 10;
      color: rgba(232,228,222,.16); font-size: 10px; letter-spacing: .12em;
      text-transform: uppercase; pointer-events: none;
    }

    /* ── BOARD PICKER ── */
    #board-picker { display: none; flex-direction: column; gap: .55rem; }
    #board-picker.show { display: flex; }
    .bp-label { font-size: .68rem; font-weight: 700; letter-spacing: .11em; text-transform: uppercase; color: var(--gold); }
    .bp-options { display: flex; align-items: center; gap: .35rem; }
    .bp-arrow {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px solid var(--gborder); background: transparent;
      color: var(--muted); font-size: 11px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all .15s; font-family: sans-serif;
    }
    .bp-arrow:hover { border-color: var(--gold); color: var(--gold); background: rgba(200,168,75,.10); }
    .bp-arrow:disabled { opacity: .2; cursor: default; }
    .bp-cards { display: flex; gap: .4rem; flex: 1; overflow: hidden; }
    .bp-btn {
      flex: 1; padding: .55rem .3rem; border: 1px solid var(--gborder); border-radius: 7px;
      background: transparent; color: var(--muted); font-size: .72rem; font-weight: 600;
      cursor: pointer; text-align: center; transition: all .2s;
      font-family: 'Noto Sans', sans-serif; line-height: 1.5;
      position: relative; overflow: hidden;
    }
    .bp-btn::before {
      content: ''; position: absolute; inset: 0; border-radius: 7px;
      background: radial-gradient(circle at 50% 120%, rgba(200,168,75,.18), transparent 70%);
      opacity: 0; transition: opacity .2s;
    }
    .bp-btn:hover { border-color: var(--gold); color: var(--text); transform: translateY(-1px); }
    .bp-btn:hover::before { opacity: 1; }
    .bp-btn.active { background: rgba(200,168,75,.14); border-color: var(--gold); color: var(--gold); box-shadow: 0 0 10px rgba(200,168,75,.15); }
    .bp-btn.active::before { opacity: 1; }
    .bp-btn .bp-sub { display: block; font-size: .6rem; font-weight: 400; color: inherit; opacity: .7; }
    .bp-btn .bp-grid { display: block; margin: .2rem auto .1rem; opacity: .5; }
    .bp-desc { font-size: .74rem; color: var(--muted); line-height: 1.6; padding: .3rem .5rem;
      background: rgba(200,168,75,.05); border-radius: 4px; border-left: 2px solid var(--gborder); }

    /* Hamburger butonu — sadece mobilde görünür */
    .mob-menu-btn {
      display: none; background: none; border: 1px solid var(--gborder);
      color: var(--gold); border-radius: 6px; padding: 5px 10px;
      font-size: 15px; cursor: pointer; line-height: 1;
    }

    /* Mobil overlay — menü açıkken arka plan karartma */
    #mob-overlay {
      display: none; position: fixed; inset: 0; z-index: 19;
      background: rgba(0,0,0,.55);
    }
    #mob-overlay.show { display: block; }

    @media (max-width: 768px) {
      #sidebar, #sb-toggle, #hint { display: none; }
      #lesson-panel, #nav-bar { width: 100%; left: 0; border-left: none; }
      #rotate-toggle { left: 10px; }
    }

    @media (max-width: 640px) {
      /* Topbar */
      .mob-menu-btn { display: flex; align-items: center; }
      .prog-wrap { display: none; }
      .page-title { font-size: .85rem; }

      /* Sidebar overlay */
      #sidebar {
        display: block;
        width: 82vw; max-width: 300px;
        transform: translateX(-100%);
        z-index: 21;
      }
      #sidebar.mob-open { transform: translateX(0); }

      /* Drag handle */
      .panel-handle { display: block; }

      /* Ctrl zone */
      #ctrl-zone { display: flex; }

      /* Lesson panel: saydam bottom sheet — varsayılan kapalı */
      #lesson-panel {
        top: auto; bottom: 0;
        left: 0; right: 0; width: 100%;
        max-height: 68px;
        overflow: hidden;
        border-left: none;
        border-top: 1px solid rgba(200,168,75,.18);
        padding: .5rem 1rem .5rem;
        gap: .4rem;
        background: rgba(8,8,14,.48);
        transition: max-height .3s ease;
      }
      /* Açık durum */
      #lesson-panel.expanded {
        max-height: 46vh;
        overflow-y: auto;
      }

      /* Bölüm etiketi gizle */
      .ch-tag { display: none; }

      /* Nav bar tamamen gizle */
      #nav-bar { display: none; }

      /* Canvas nav pill: mobilde gizle (ctrl-zone devraldı) */
      #canvas-nav { display: none; }

      /* Rotate toggle */
      #rotate-toggle { bottom: auto; top: 56px; left: 10px; }

      /* Adım noktaları */
      .sdot { width: 11px; height: 11px; }
      .step-dots { gap: .6rem; padding: .2rem 0; }

      /* Font */
      #lesson-title { font-size: 1.05rem; line-height: 1.2; }
      #lesson-body  { font-size: .83rem; line-height: 1.68; }
      #feedback     { font-size: .76rem; padding: .5rem .75rem; }
    }
  </style>
</head>
<body>

<!-- Complete screen -->
<div id="complete-screen">
  <div class="comp-icon">🎉</div>
  <div class="comp-title">Tebrikler!</div>
  <div class="comp-sub" id="complete-msg">Bölümü tamamladın!</div>
  <button class="nav-btn primary" onclick="closeComplete()" style="margin-top:.5rem">Devam Et →</button>
</div>

<!-- Canvas navigation pill -->
<div id="canvas-nav">
  <button class="cc-btn" id="cnav-prev" onclick="prevStep()">‹</button>
  <span id="cc-counter"></span>
  <button class="cc-btn" id="cnav-next" onclick="nextStep()">›</button>
</div>

<!-- Canvas (3D board) -->
<canvas id="c"></canvas>

<!-- Feedback flash overlay -->
<div id="flash"></div>

<!-- Topbar -->
<div id="topbar">
  <div class="tb-left">
    <button class="mob-menu-btn" id="mob-menu-btn" onclick="toggleMobileMenu()">☰</button>
    <a class="back-btn" href="index.html">← Ana</a>
    <span class="page-title">Go Öğren 3D</span>
  </div>
  <div class="prog-wrap">
    <span class="prog-text" id="prog-text">0 / 0</span>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="lang-switcher">
    <button class="lang-btn active" data-lang="tr" onclick="setLang('tr')">TR</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" data-lang="ru" onclick="setLang('ru')">RU</button>
  </div>
</div>

<!-- Mobil menü overlay -->
<div id="mob-overlay" onclick="toggleMobileMenu()"></div>

<!-- Sidebar toggle -->
<button id="sb-toggle" onclick="toggleSidebar()">◀</button>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-header">Müfredat</div>
  <div id="curriculum"></div>
</div>

<!-- Lesson panel -->
<div id="lesson-panel">
  <div class="panel-handle" onclick="togglePanel()"></div>
  <div id="ctrl-zone">
    <button class="cc-btn" id="mprev" onclick="prevStep()">‹</button>
    <span id="mob-counter"></span>
    <button class="cc-btn" id="mnext" onclick="nextStep()">›</button>
  </div>
  <div class="ch-tag"  id="chapter-tag"></div>
  <div id="lesson-title">Ders Seç</div>
  <div class="step-dots" id="step-dots"></div>
  <div id="lesson-body"><p>Sol panelden bir ders seçin.</p></div>
  <!-- Board size picker (Tahta ve Taşlar dersi) -->
  <div id="board-picker">
    <div class="bp-label">Tahta Boyutu</div>
    <div class="bp-options">
      <button class="bp-arrow" id="bp-prev" onclick="bpStep(-1)">&#8249;</button>
      <div class="bp-cards">

        <button class="bp-btn" data-size="13" onclick="setBoardSize(13)">13×13<svg class="bp-grid" width="24" height="24" viewBox="0 0 24 24"><g stroke="currentColor" stroke-width=".7" opacity=".6"><line x1="3" y1="3" x2="3" y2="21"/><line x1="8" y1="3" x2="8" y2="21"/><line x1="12" y1="3" x2="12" y2="21"/><line x1="16" y1="3" x2="16" y2="21"/><line x1="21" y1="3" x2="21" y2="21"/><line x1="3" y1="3" x2="21" y2="3"/><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="16" x2="21" y2="16"/><line x1="3" y1="21" x2="21" y2="21"/></g><circle cx="12" cy="12" r="1.2" fill="currentColor" opacity=".5"/></svg><span class="bp-sub">Orta</span></button>

<script>
/* ═══════════════════════════════════════════════════════
   3D ENGINE
═══════════════════════════════════════════════════════ */
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H, projCY = 0;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; updateProjCenter(); }
resize(); window.addEventListener('resize', resize);

let camYaw = 0.50, camPitch = 0.88, camDist = 500;
let camTarget = null, camStart = null, camLerpT = 1;
const CAM_DUR = 0.65;

let panelExpanded = false;
function togglePanel() {
  panelExpanded = !panelExpanded;
  document.getElementById('lesson-panel').classList.toggle('expanded', panelExpanded);
  updateProjCenter();
}

function updateProjCenter() {
  if(innerWidth <= 640) {
    const panelH = panelExpanded ? innerHeight * 0.46 : 68;
    projCY = 46 + (innerHeight - 46 - panelH) / 2;
  } else {
    projCY = H / 2;
  }
}

function project(x, y, z) {
  const rx  =  x*Math.cos(camYaw)   + z*Math.sin(camYaw);
  const rz  = -x*Math.sin(camYaw)   + z*Math.cos(camYaw);
  const ry2 =  y*Math.cos(camPitch) - rz*Math.sin(camPitch);
  const rz2 =  y*Math.sin(camPitch) + rz*Math.cos(camPitch);
  const fov = 700, sc = fov / Math.max(fov + rz2, 1) * (camDist/500);
  return { sx: W/2 + rx*sc, sy: projCY + ry2*sc, scale: sc, z: rz2 };
}

let SIZE = 9, CELL = 48, HALF = (SIZE-1)*CELL/2;
const BOARD_H = 14;
let STONE_R = 20; // CELL ile orantılı güncellenir: CELL * (20/48)
const ASPECT_3D = 0.36, ANIM_DUR = 0.20;

function stoneRadii(p, mul) {
  mul = mul || 1;
  const rx = STONE_R * p.scale * mul;
  const sp = Math.sin(camPitch), cp = Math.cos(camPitch);
  return { rx, ry: rx * Math.sqrt(sp*sp + ASPECT_3D*ASPECT_3D*cp*cp) };
}

function easeOutBack(t) {
  const c1=1.70158, c3=c1+1;
  return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);
}
function easeInOutCubic(t) { return t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function lerp(a,b,t) { return a+(b-a)*t; }

/* Wood texture */
const woodCv = document.createElement('canvas');
woodCv.width = woodCv.height = 512;
(function(){
  const wc = woodCv.getContext('2d');
  const g  = wc.createLinearGradient(0,0,512,0);
  g.addColorStop(0,'#c8a84a'); g.addColorStop(.15,'#d4b050');
  g.addColorStop(.38,'#c2a040'); g.addColorStop(.6,'#caa848');
  g.addColorStop(.82,'#be9c3a'); g.addColorStop(1,'#c8a444');
  wc.fillStyle=g; wc.fillRect(0,0,512,512);
  wc.globalAlpha=0.055;
  for(let i=0;i<120;i++){
    const y=Math.random()*512, dk=i%7===0;
    wc.strokeStyle=dk?'#5a2e00':'#e8d060'; wc.lineWidth=dk?Math.random()*1.2+.4:Math.random()*.8+.2;
    wc.beginPath(); wc.moveTo(0,y+(Math.random()-.5)*4);
    wc.bezierCurveTo(128,y+(Math.random()-.5)*3,384,y+(Math.random()-.5)*3,512,y+(Math.random()-.5)*4);
    wc.stroke();
  }
  wc.globalAlpha=.10;
  const vig=wc.createLinearGradient(0,0,512,512);
  vig.addColorStop(0,'#3a1c00'); vig.addColorStop(.5,'transparent'); vig.addColorStop(1,'#3a1c00');
  wc.fillStyle=vig; wc.fillRect(0,0,512,512);
  wc.globalAlpha=1;
})();
const woodPat = ctx.createPattern(woodCv,'repeat');

/* Game state */
const game = {
  grid:   Array.from({length:SIZE},()=>Array(SIZE).fill(null)),
  turn:   'black',
  stones: [],

  reset() {
    this.grid   = Array.from({length:SIZE},()=>Array(SIZE).fill(null));
    this.turn   = 'black'; this.stones = [];
  },

  seed(gx, gz, colorChar) {
    if(gx<0||gz<0||gx>=SIZE||gz>=SIZE) return;
    if(this.grid[gz][gx]) return;
    const isB = (colorChar==='B'||colorChar==='black');
    const col  = isB ? 'black' : 'white';
    const wx=-HALF+gx*CELL, wz=-HALF+gz*CELL;
    const wy=-(BOARD_H/2)-STONE_R*ASPECT_3D-1;
    this.grid[gz][gx] = col;
    this.stones.push({ gx,gz,color:col,wx,wy,wz, t:0,done:false,
      pts:makeParticles(wx,wy,wz,isB), showPts:false,
      removing:false, removeT:0 });
  },

  place(gx, gz) {
    this.seed(gx, gz, this.turn);
    this.turn = this.turn==='black' ? 'white' : 'black';
  },

  removeStone(gx, gz) {
    this.grid[gz][gx] = null;
    const s = this.stones.find(s=>s.gx===gx&&s.gz===gz&&!s.removing);
    if(s) { s.removing=true; s.removeT=0; }
  },
};

function makeParticles(wx,wy,wz,isBlack) {
  const ps=[];
  for(let i=0;i<14;i++){
    const a=Math.PI*2*i/14+Math.random()*.5, v=1.2+Math.random()*1.8;
    ps.push({ x:wx,y:wy,z:wz, vx:Math.cos(a)*v*CELL*.09, vy:-(2.5+Math.random()*3)*CELL*.09, vz:Math.sin(a)*v*CELL*.09,
      life:1, r:2+Math.random()*2, col:isBlack?[160,175,200]:[255,240,170] });
  }
  return ps;
}

const G = 2200;
function updateAnimations(dt) {
  /* Camera lerp */
  if(camLerpT<1&&camTarget) {
    camLerpT = Math.min(1, camLerpT+dt/CAM_DUR);
    const t = easeInOutCubic(camLerpT);
    camYaw   = lerp(camStart.yaw,  camTarget.yaw,  t);
    camPitch = lerp(camStart.pitch,camTarget.pitch, t);
    camDist  = lerp(camStart.dist, camTarget.dist,  t);
  }
  /* Stones */
  for(let i=game.stones.length-1;i>=0;i--) {
    const s = game.stones[i];
    if(s.removing) {
      s.removeT = Math.min(1,(s.removeT||0)+dt/.25);
      if(s.removeT>=1) game.stones.splice(i,1);
      continue;
    }
    if(s.showPts) {
      for(const p of s.pts) {
        if(p.life<=0) continue;
        p.life-=dt*2; p.vy+=G*.2*dt;
        p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt;
        p.vx*=.97; p.vz*=.97;
      }
    }
    if(s.done) continue;
    s.t += dt/ANIM_DUR;
    if(s.t>=1) { s.t=1; s.done=true; s.showPts=true; }
  }
}

/* Board drawing */
function drawFace(corners,fill,stroke) {
  const pts=corners.map(([x,y,z])=>project(x,y,z));
  ctx.beginPath(); pts.forEach((p,i)=>i===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy));
  ctx.closePath(); ctx.fillStyle=fill; ctx.fill();
  ctx.strokeStyle=stroke||fill; ctx.lineWidth=1; ctx.stroke();
}

function drawBoard() {
  const bh=BOARD_H/2, bw=HALF+CELL*.82;
  drawFace([[-bw,-bh,-bw],[-bw,-bh,bw],[-bw,bh,bw],[-bw,bh,-bw]],'#7a4e0e','#5e3a08');
  drawFace([[-bw,-bh,bw],[bw,-bh,bw],[bw,bh,bw],[-bw,bh,bw]],'#8a5a12','#6a4408');
  drawFace([[bw,-bh,-bw],[bw,-bh,bw],[bw,bh,bw],[bw,bh,-bw]],'#966014','#724808');
  const top=[[-bw,-bh,-bw],[bw,-bh,-bw],[bw,-bh,bw],[-bw,-bh,bw]];
  const tpts=top.map(([x,y,z])=>project(x,y,z));
  ctx.save(); ctx.beginPath();
  tpts.forEach((p,i)=>i===0?ctx.moveTo(p.sx,p.sy):ctx.lineTo(p.sx,p.sy));
  ctx.closePath(); ctx.clip();
  ctx.fillStyle=woodPat; ctx.globalAlpha=.96; ctx.fill();
  ctx.globalAlpha=.06; ctx.fillStyle='#2a1200'; ctx.fill();
  ctx.globalAlpha=1; ctx.strokeStyle='#6a4008'; ctx.lineWidth=1.6; ctx.stroke();
  ctx.restore();
}

function drawGrid() {
  const Y=-BOARD_H/2-.4, LTRS='ABCDEFGHJ';
  const corners=[[-HALF,Y,-HALF],[HALF,Y,-HALF],[HALF,Y,HALF],[-HALF,Y,HALF]];
  ctx.strokeStyle='rgba(55,24,0,.92)'; ctx.lineWidth=1.9;
  for(let i=0;i<4;i++){
    const a=project(...corners[i]), b=project(...corners[(i+1)%4]);
    ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
  }
  ctx.strokeStyle='rgba(55,24,0,.68)'; ctx.lineWidth=.8;
  for(let i=1;i<SIZE-1;i++){
    const p=-HALF+i*CELL;
    const a=project(p,Y,-HALF),b=project(p,Y,HALF); ctx.beginPath(); ctx.moveTo(a.sx,a.sy); ctx.lineTo(b.sx,b.sy); ctx.stroke();
    const c=project(-HALF,Y,p),d=project(HALF,Y,p); ctx.beginPath(); ctx.moveTo(c.sx,c.sy); ctx.lineTo(d.sx,d.sy); ctx.stroke();
  }
  const HOSHI = SIZE===19
    ? [[3,3],[9,3],[15,3],[3,9],[9,9],[15,9],[3,15],[9,15],[15,15]]
    : SIZE===13
    ? [[3,3],[9,3],[6,6],[3,9],[9,9]]
    : [[2,2],[6,2],[4,4],[2,6],[6,6]];
  const hoshiR = SIZE===9 ? 3.8 : SIZE===13 ? 2.6 : 2.0;
  HOSHI.forEach(([sx,sz])=>{
    const p=project(-HALF+sx*CELL,Y,-HALF+sz*CELL);
    ctx.beginPath(); ctx.arc(p.sx,p.sy,hoshiR*p.scale,0,Math.PI*2);
    ctx.fillStyle='rgba(48,20,0,.88)'; ctx.fill();
  });
  const LTRS_ALL='ABCDEFGHJKLMNOPQRST';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<SIZE;i++){
    const pos=-HALF+i*CELL;
    const lb=project(pos,Y,HALF+CELL*.72), nl=project(-HALF-CELL*.72,Y,pos);
    const fs=Math.round(9*lb.scale); if(fs<6) continue;
    ctx.font=`bold ${fs}px monospace`; ctx.fillStyle='rgba(75,36,6,.78)';
    ctx.fillText(LTRS_ALL[i],lb.sx,lb.sy); ctx.fillText(String(SIZE-i),nl.sx,nl.sy);
  }
}

/* Liberty crosses — nefes noktaları görselleştirme */
function drawLiberties(step) {
  if(!step || !step.showLiberties) return;
  const board = step.board || [];
  const sz    = step.size  || SIZE;
  // Build occupancy map from step board
  const occ = Array.from({length:sz}, ()=>Array(sz).fill(null));
  board.forEach(s=>{ if(s.x>=0&&s.x<sz&&s.y>=0&&s.y<sz) occ[s.y][s.x]=s.color; });

  // Collect unique liberty points adjacent to black stones
  const dirs = [{dx:1,dz:0},{dx:-1,dz:0},{dx:0,dz:1},{dx:0,dz:-1}];
  const seen  = new Set();
  const libs  = [];
  board.forEach(s=>{
    if(s.color!=='B') return;
    dirs.forEach(({dx,dz})=>{
      const nx=s.x+dx, nz=s.y+dz;
      if(nx<0||nz<0||nx>=sz||nz>=sz) return;
      if(occ[nz][nx]) return;
      const key=`${nx},${nz}`;
      if(!seen.has(key)){ seen.add(key); libs.push({x:nx,z:nz}); }
    });
  });
  if(!libs.length) return;

  const Y   = -BOARD_H/2 - .3;
  const ARM = CELL * 0.30;                 // çarpı kol uzunluğu
  const pulse = .6 + .4*Math.sin(hlTime*2.8);

  libs.forEach(({x,z})=>{
    const wx = -HALF + x*CELL;
    const wz = -HALF + z*CELL;
    const p  = project(wx, Y, wz);
    if(p.scale < 0.15) return;

    // 4 uç nokta (board yüzeyinde)
    const pL = project(wx-ARM, Y, wz);
    const pR = project(wx+ARM, Y, wz);
    const pU = project(wx, Y, wz-ARM);
    const pD = project(wx, Y, wz+ARM);

    ctx.save();
    ctx.globalAlpha = 0.82 * pulse;
    ctx.strokeStyle = '#7ec8e3';
    ctx.lineWidth   = Math.max(1, 2.2 * p.scale);
    ctx.lineCap     = 'round';

    // Yatay kol
    ctx.beginPath();
    ctx.moveTo(pL.sx, pL.sy);
    ctx.lineTo(pR.sx, pR.sy);
    ctx.stroke();

    // Dikey kol
    ctx.beginPath();
    ctx.moveTo(pU.sx, pU.sy);
    ctx.lineTo(pD.sx, pD.sy);
    ctx.stroke();

    // Merkez nokta
    ctx.beginPath();
    ctx.arc(p.sx, p.sy, 2.5*p.scale, 0, Math.PI*2);
    ctx.fillStyle = '#7ec8e3';
    ctx.fill();

    ctx.restore();
  });
}

/* SGF marker işaretleri — üçgen (TR) ve kare (SQ) */
function drawMarkers(step) {
  if(!step || !step.markers) return;
  const Y = -BOARD_H/2 - .3;
  step.markers.forEach(({x, y, type}) => {
    const wx = -HALF + x*CELL;
    const wz = -HALF + y*CELL;
    const p  = project(wx, Y, wz);
    if(p.scale < 0.12) return;
    const arm = CELL * 0.28;
    ctx.save();
    ctx.lineWidth = Math.max(1, 1.8 * p.scale);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    if(type === 'triangle') {
      const pT = project(wx,          Y, wz - arm);
      const pL = project(wx - arm*.87, Y, wz + arm*.5);
      const pR = project(wx + arm*.87, Y, wz + arm*.5);
      ctx.beginPath();
      ctx.moveTo(pT.sx,pT.sy); ctx.lineTo(pL.sx,pL.sy); ctx.lineTo(pR.sx,pR.sy);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(200,168,75,.90)'; ctx.stroke();
    } else if(type === 'square') {
      const pTL = project(wx-arm,Y,wz-arm), pTR = project(wx+arm,Y,wz-arm);
      const pBR = project(wx+arm,Y,wz+arm), pBL = project(wx-arm,Y,wz+arm);
      ctx.beginPath();
      ctx.moveTo(pTL.sx,pTL.sy); ctx.lineTo(pTR.sx,pTR.sy);
      ctx.lineTo(pBR.sx,pBR.sy); ctx.lineTo(pBL.sx,pBL.sy);
      ctx.closePath();
      ctx.strokeStyle = 'rgba(200,168,75,.70)'; ctx.stroke();
    }
    ctx.restore();
  });
}

/* Grup durum imleci — nefes noktası (+) stili, yeşil=canlı göz, kırmızı=ölü */
function drawGroupIndicators(step) {
  if(!step || !step.groupIndicators) return;
  const Y     = -BOARD_H/2 - .3;
  const ARM   = CELL * 0.30;
  const pulse = .6 + .4*Math.sin(hlTime*2.8);
  step.groupIndicators.forEach(({x, y, color}) => {
    const col = color === 'green' ? '#3ec878' : '#e04040';
    const wx  = -HALF + x*CELL;
    const wz  = -HALF + y*CELL;
    const p   = project(wx, Y, wz);
    if(p.scale < 0.15) return;
    const pL = project(wx-ARM, Y, wz),   pR = project(wx+ARM, Y, wz);
    const pU = project(wx,     Y, wz-ARM), pD = project(wx,   Y, wz+ARM);
    ctx.save();
    ctx.globalAlpha = 0.82 * pulse;
    ctx.strokeStyle = col;
    ctx.lineWidth   = Math.max(1, 2.2 * p.scale);
    ctx.lineCap     = 'round';
    ctx.beginPath(); ctx.moveTo(pL.sx,pL.sy); ctx.lineTo(pR.sx,pR.sy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pU.sx,pU.sy); ctx.lineTo(pD.sx,pD.sy); ctx.stroke();
    ctx.beginPath(); ctx.arc(p.sx, p.sy, 2.5*p.scale, 0, Math.PI*2);
    ctx.fillStyle = col; ctx.fill();
    ctx.restore();
  });
}

function drawNextMoveHint() {
  if(!nextMoveHint) return;
  const Y     = -BOARD_H/2 - .3;
  const ARM   = CELL * 0.30;
  const pulse = .6 + .4*Math.sin(hlTime*2.8);
  const wx    = -HALF + nextMoveHint.x*CELL;
  const wz    = -HALF + nextMoveHint.y*CELL;
  const p     = project(wx, Y, wz);
  if(p.scale < 0.15) return;
  const pL = project(wx-ARM, Y, wz),   pR = project(wx+ARM, Y, wz);
  const pU = project(wx,     Y, wz-ARM), pD = project(wx,   Y, wz+ARM);
  ctx.save();
  ctx.globalAlpha = 0.82 * pulse;
  ctx.strokeStyle = '#3ec878';
  ctx.lineWidth   = Math.max(1, 2.2 * p.scale);
  ctx.lineCap     = 'round';
  ctx.beginPath(); ctx.moveTo(pL.sx,pL.sy); ctx.lineTo(pR.sx,pR.sy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pU.sx,pU.sy); ctx.lineTo(pD.sx,pD.sy); ctx.stroke();
  ctx.beginPath(); ctx.arc(p.sx, p.sy, 2.5*p.scale, 0, Math.PI*2);
  ctx.fillStyle = '#3ec878'; ctx.fill();
  ctx.restore();
}

/* Ko gösterge imleci — yanıp sönen çarpı (kırmızı=yasak, yeşil=serbest) */
function drawKoPoint({x, y, color}) {
  const col = color === 'green' ? '#27ae60' : '#e03030';
  const Y   = -BOARD_H/2 - .3;
  const ARM = CELL * 0.30;
  const pulse = .6 + .4*Math.sin(hlTime*2.8);
  const wx = -HALF + x*CELL;
  const wz = -HALF + y*CELL;
  const p  = project(wx, Y, wz);
  if(p.scale < 0.15) return;

  const pL = project(wx-ARM, Y, wz);
  const pR = project(wx+ARM, Y, wz);
  const pU = project(wx, Y, wz-ARM);
  const pD = project(wx, Y, wz+ARM);

  ctx.save();
  ctx.globalAlpha = 0.85 * pulse;
  ctx.strokeStyle = col;
  ctx.lineWidth   = Math.max(1, 2.2 * p.scale);
  ctx.lineCap     = 'round';
  ctx.beginPath(); ctx.moveTo(pL.sx, pL.sy); ctx.lineTo(pR.sx, pR.sy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(pU.sx, pU.sy); ctx.lineTo(pD.sx, pD.sy); ctx.stroke();
  ctx.beginPath(); ctx.arc(p.sx, p.sy, 2.5*p.scale, 0, Math.PI*2);
  ctx.fillStyle = col; ctx.fill();
  ctx.restore();
}

/* Bölge işaretçileri — yanıp sönen çarpı (siyah/beyaz bölge) */
function drawTerritory(points, side) {
  const col = side === 'black' ? '#1a1a2e' : '#f5f0e8';
  const Y   = -BOARD_H/2 - .3;
  const ARM = CELL * 0.22;
  const pulse = .6 + .4*Math.sin(hlTime*2.8);

  points.forEach(({x, y}) => {
    const wx = -HALF + x*CELL;
    const wz = -HALF + y*CELL;
    const p  = project(wx, Y, wz);
    if(p.scale < 0.15) return;

    const pL = project(wx-ARM, Y, wz);
    const pR = project(wx+ARM, Y, wz);
    const pU = project(wx, Y, wz-ARM);
    const pD = project(wx, Y, wz+ARM);

    ctx.save();
    ctx.globalAlpha = 0.90 * pulse;
    ctx.strokeStyle = col;
    ctx.lineWidth   = Math.max(1, 2.2 * p.scale);
    ctx.lineCap     = 'round';
    ctx.beginPath(); ctx.moveTo(pL.sx, pL.sy); ctx.lineTo(pR.sx, pR.sy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pU.sx, pU.sy); ctx.lineTo(pD.sx, pD.sy); ctx.stroke();
    ctx.restore();
  });
}

/* Highlight rings — target intersections */
let hlTime = 0;
function drawHighlights(step) {
  if(!step) return;
  const targets=[];
  if(step.answer) targets.push(step.answer);
  else if(Array.isArray(step.answers)) targets.push(...step.answers);
  if(!targets.length) return;

  const Y   = -BOARD_H/2 - .3;
  const sp  = Math.abs(Math.sin(camPitch));
  const pulse = .55 + .45*Math.sin(hlTime*3.5);

  for(const t of targets) {
    const p  = project(-HALF+t.x*CELL, Y, -HALF+t.y*CELL);
    const rx = STONE_R*p.scale*1.55;
    const ry = rx*sp;
    if(rx<4) continue;
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(200,168,75,${.55*pulse})`;
    ctx.lineWidth=2*p.scale; ctx.stroke();
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx*1.28,ry*1.28,0,0,Math.PI*2);
    ctx.strokeStyle=`rgba(200,168,75,${.20*pulse})`;
    ctx.lineWidth=1*p.scale; ctx.stroke();
  }
}

/* Stone drawing */
function drawStone(wx,wy,wz,color,alpha,mul) {
  alpha = alpha!==undefined ? alpha : 1;
  mul   = mul!==undefined   ? mul   : 1;
  const p = project(wx,wy,wz);
  const {rx,ry} = stoneRadii(p,mul);
  if(rx<3) return;
  const isB = color==='black';
  ctx.save(); ctx.globalAlpha=alpha;

  if(mul>=.85){
    const ps=project(wx,-BOARD_H/2-.5,wz);
    const sha=.42*Math.min(1,mul);
    const sg=ctx.createRadialGradient(ps.sx+rx*.1,ps.sy+ry*.12,0,ps.sx+rx*.1,ps.sy+ry*.12,rx);
    sg.addColorStop(0,`rgba(0,0,0,${sha})`); sg.addColorStop(.65,`rgba(0,0,0,${sha*.5})`); sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.ellipse(ps.sx+rx*.1,ps.sy+ry*.12,rx,ry*.48,0,0,Math.PI*2);
    ctx.fillStyle=sg; ctx.fill();
  }

  if(isB) {
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2);
    const g=ctx.createRadialGradient(p.sx-rx*.18,p.sy-ry*.25,rx*.03,p.sx+rx*.08,p.sy+ry*.08,rx*1.05);
    g.addColorStop(0,'#4e5c70'); g.addColorStop(.12,'#22283a'); g.addColorStop(.45,'#0c0e18'); g.addColorStop(.82,'#07080e'); g.addColorStop(1,'#050508');
    ctx.fillStyle=g; ctx.fill();
    const eg=ctx.createRadialGradient(p.sx,p.sy,rx*.55,p.sx,p.sy,rx*1.02);
    eg.addColorStop(0,'rgba(0,0,0,0)'); eg.addColorStop(1,'rgba(0,0,0,.42)');
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2); ctx.fillStyle=eg; ctx.fill();
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2);
    ctx.strokeStyle='#181c28'; ctx.lineWidth=rx*.045; ctx.stroke();
    const hg=ctx.createRadialGradient(p.sx-rx*.24,p.sy-ry*.32,0,p.sx-rx*.24,p.sy-ry*.32,rx*.30);
    hg.addColorStop(0,'rgba(210,225,255,.42)'); hg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.ellipse(p.sx-rx*.24,p.sy-ry*.32,rx*.30,ry*.22,-.28,0,Math.PI*2);
    ctx.fillStyle=hg; ctx.fill();
  } else {
    ctx.save();
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2); ctx.clip();
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2);
    const base=ctx.createRadialGradient(p.sx,p.sy,0,p.sx,p.sy,rx);
    base.addColorStop(0,'#f8f4ec'); base.addColorStop(.42,'#f2ece0'); base.addColorStop(.78,'#e6dfd2'); base.addColorStop(1,'#d8d0c2');
    ctx.fillStyle=base; ctx.fill();
    const clouds=[{dx:-.06,dy:-.05,rr:.45,a:.07},{dx:.15,dy:.10,rr:.34,a:.055},{dx:-.16,dy:.16,rr:.28,a:.045},{dx:.05,dy:-.18,rr:.32,a:.038},{dx:-.03,dy:.04,rr:.58,a:.028},{dx:.20,dy:-.07,rr:.24,a:.042}];
    for(const cl of clouds){
      const cx=p.sx+rx*cl.dx,cy=p.sy+ry*cl.dy,cr=rx*cl.rr;
      const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,cr);
      cg.addColorStop(0,`rgba(255,252,246,${cl.a})`); cg.addColorStop(1,'rgba(255,252,246,0)');
      ctx.beginPath(); ctx.ellipse(cx,cy,cr,cr*.68,cl.dx*.6,0,Math.PI*2); ctx.fillStyle=cg; ctx.fill();
    }
    const ed=ctx.createRadialGradient(p.sx,p.sy,rx*.50,p.sx,p.sy,rx);
    ed.addColorStop(0,'rgba(0,0,0,0)'); ed.addColorStop(.72,'rgba(35,25,10,.05)'); ed.addColorStop(.90,'rgba(35,25,10,.16)'); ed.addColorStop(1,'rgba(35,25,10,.32)');
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2); ctx.fillStyle=ed; ctx.fill();
    const gh=ctx.createRadialGradient(p.sx,p.sy,rx*.80,p.sx,p.sy,rx);
    gh.addColorStop(0,'rgba(130,160,135,0)'); gh.addColorStop(.65,'rgba(130,160,135,.055)'); gh.addColorStop(1,'rgba(110,148,118,.14)');
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2); ctx.fillStyle=gh; ctx.fill();
    const ml=ctx.createRadialGradient(p.sx-rx*.05,p.sy-ry*.08,0,p.sx-rx*.05,p.sy-ry*.08,rx*.85);
    ml.addColorStop(0,'rgba(255,253,248,.15)'); ml.addColorStop(.5,'rgba(255,253,248,.05)'); ml.addColorStop(1,'rgba(255,253,248,0)');
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2); ctx.fillStyle=ml; ctx.fill();
    ctx.restore();
    ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(90,72,45,.50)'; ctx.lineWidth=rx*.042; ctx.stroke();
  }
  ctx.restore();
}

function drawParticles(ps) {
  for(const p of ps){
    if(p.life<=0) continue;
    const pr=project(p.x,p.y,p.z), r=p.r*pr.scale*p.life;
    if(r<.3) continue;
    const [r0,g0,b0]=p.col;
    ctx.beginPath(); ctx.arc(pr.sx,pr.sy,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${r0},${g0},${b0},${p.life*.7})`; ctx.fill();
  }
}

let ghostGrid=null, ghostActive=false;

function render() {
  const bg=ctx.createRadialGradient(W*.5,H*.45,0,W*.5,H*.5,Math.max(W,H)*.75);
  bg.addColorStop(0,'#141420'); bg.addColorStop(1,'#060608');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  drawBoard(); drawGrid();

  if(CUR_STEP_DATA && !CUR_STEP_DATA.auto) drawHighlights(CUR_STEP_DATA);
  if(CUR_STEP_DATA) drawLiberties(CUR_STEP_DATA);
  if(CUR_STEP_DATA) drawMarkers(CUR_STEP_DATA);
  if(CUR_STEP_DATA) drawGroupIndicators(CUR_STEP_DATA);
  drawNextMoveHint();
  if(koPoint) drawKoPoint(koPoint);
  if(CUR_STEP_DATA?.blackTerritory?.length) drawTerritory(CUR_STEP_DATA.blackTerritory, 'black');
  if(CUR_STEP_DATA?.whiteTerritory?.length) drawTerritory(CUR_STEP_DATA.whiteTerritory, 'white');

  /* Yasak hamle işaretleri */
  if(CUR_STEP_DATA && CUR_STEP_DATA.forbidden) {
    const Y = -BOARD_H/2 - .3;
    const sp = Math.abs(Math.sin(camPitch));
    CUR_STEP_DATA.forbidden.forEach(({x,y})=>{
      const wx=-HALF+x*CELL, wz=-HALF+y*CELL;
      const p = project(wx, Y, wz);
      const r = STONE_R * p.scale * 1.1;
      if(r < 4) return;
      const ry = r * Math.sqrt(Math.sin(camPitch)**2 + ASPECT_3D**2 * Math.cos(camPitch)**2);
      ctx.save();
      /* X çizgileri — board yüzeyinde yatay+dikey */
      const arm = r * .62;
      const pL=project(wx-arm*.9,Y,wz-arm*.9), pR=project(wx+arm*.9,Y,wz+arm*.9);
      const pU=project(wx+arm*.9,Y,wz-arm*.9), pD=project(wx-arm*.9,Y,wz+arm*.9);
      ctx.strokeStyle='rgba(220,60,60,.80)'; ctx.lineWidth=Math.max(1.5,2.2*p.scale); ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(pL.sx,pL.sy); ctx.lineTo(pR.sx,pR.sy); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(pU.sx,pU.sy); ctx.lineTo(pD.sx,pD.sy); ctx.stroke();
      ctx.restore();
    });
  }

  if(ghostActive&&ghostGrid){
    const {gx,gz}=ghostGrid;
    if(!game.grid[gz][gx]){
      const wy=-(BOARD_H/2)-STONE_R*ASPECT_3D-1;
      const step=CUR_STEP_DATA;
      /* Doğru hamle mi? */
      const isCorrect = step && (
        (step.answer && step.answer.x===gx && step.answer.y===gz) ||
        (Array.isArray(step.answers) && step.answers.some(a=>a.x===gx&&a.y===gz)) ||
        step.answers==='any'
      );
      if(isCorrect) {
        /* Belirgin ghost + pulsing yeşil halka */
        drawStone(-HALF+gx*CELL,wy,-HALF+gz*CELL,game.turn,.60,1);
        const Y=-BOARD_H/2-.3, sp=Math.abs(Math.sin(camPitch));
        const p=project(-HALF+gx*CELL,Y,-HALF+gz*CELL);
        const rx=STONE_R*p.scale*1.45, ry2=rx*sp;
        const pulse=.55+.45*Math.sin(hlTime*4);
        ctx.beginPath(); ctx.ellipse(p.sx,p.sy,rx,ry2,0,0,Math.PI*2);
        ctx.strokeStyle=`rgba(62,207,128,${.70*pulse})`; ctx.lineWidth=2*p.scale; ctx.stroke();
      } else {
        drawStone(-HALF+gx*CELL,wy,-HALF+gz*CELL,game.turn,.22,1);
      }
    }
  }

  const sorted=[...game.stones].sort((a,b)=>project(a.wx,a.wy,a.wz).z-project(b.wx,b.wy,b.wz).z);
  const deadSet=new Set((CUR_STEP_DATA?.deadStones||[]).map(p=>`${p.x},${p.y}`));
  for(const s of sorted){
    const dead = deadSet.has(`${s.gx},${s.gz}`);
    const al = s.removing ? Math.max(0,1-s.removeT) : (dead ? 0.28 : 1);
    const sc = s.done ? 1 : easeOutBack(Math.min(s.t,1));
    if(al>0) drawStone(s.wx,s.wy,s.wz,s.color,al,sc);
    if(s.showPts&&al>0) drawParticles(s.pts);
  }
}

/* Hit detection */
function screenToGrid(mx,my) {
  const BY=-BOARD_H/2; let best=null,bestD=Infinity,bestSc=1;
  for(let gz=0;gz<SIZE;gz++) for(let gx=0;gx<SIZE;gx++){
    const p=project(-HALF+gx*CELL,BY,-HALF+gz*CELL);
    const d=Math.hypot(mx-p.sx,my-p.sy);
    if(d<bestD){bestD=d;best={gx,gz};bestSc=p.scale;}
  }
  return bestD<CELL*.55*bestSc?best:null;
}

/* Camera animation trigger */
function animateCamera(preset) {
  camStart = {yaw:camYaw,pitch:camPitch,dist:camDist};
  camTarget = {...preset}; camLerpT=0;
}

/* Mouse */
let isDrag=false,dragFrom={x:0,y:0},lastM={x:0,y:0},rotateMode=false;

canvas.addEventListener('mousedown',e=>{
  dragFrom={x:e.clientX,y:e.clientY}; lastM={x:e.clientX,y:e.clientY}; isDrag=false;
});
canvas.addEventListener('mousemove',e=>{
  const dx=e.clientX-lastM.x,dy=e.clientY-lastM.y;
  if(e.buttons===1&&Math.hypot(e.clientX-dragFrom.x,e.clientY-dragFrom.y)>4){
    if(!CUR_STEP_DATA||CUR_STEP_DATA.auto||rotateMode) {
      isDrag=true; camYaw+=dx*.007; camPitch+=dy*.007;
      camPitch=Math.max(.08,Math.min(1.48,camPitch));
    }
  }
  lastM={x:e.clientX,y:e.clientY};
  ghostGrid = isDrag ? null : screenToGrid(e.clientX,e.clientY);
});
canvas.addEventListener('click',e=>{
  if(isDrag) return;
  if(CUR_STEP_DATA&&!CUR_STEP_DATA.auto&&!rotateMode){
    const g=screenToGrid(e.clientX,e.clientY);
    if(g) onClick3D(g.gx,g.gz);
  }
});
canvas.addEventListener('wheel',e=>{
  const minD = SIZE>=19 ? HALF*.22 : SIZE>=13 ? HALF*.50 : HALF*.80;
  camDist=Math.max(minD,Math.min(HALF*2.8,camDist+e.deltaY*(HALF/350)));
},{passive:true});

let _swX=null, _swY=null;
document.getElementById('lesson-panel').addEventListener('touchstart',e=>{
  _swX=e.touches[0].clientX;
  _swY=e.touches[0].clientY;
},{passive:true});
document.getElementById('lesson-panel').addEventListener('touchend',e=>{
  if(_swX===null) return;
  const dx=e.changedTouches[0].clientX-_swX;
  const dy=e.changedTouches[0].clientY-_swY;
  _swX=null; _swY=null;
  // Dikey kaydırma: yukarı=aç, aşağı=kapat
  if(Math.abs(dy)>Math.abs(dx) && Math.abs(dy)>30) {
    if(dy<0 && !panelExpanded) togglePanel();
    else if(dy>0 && panelExpanded) togglePanel();
    return;
  }
  // Yatay kaydırma: sola=ileri, sağa=geri
  if(Math.abs(dx)<55) return;
  const b=dx<0?document.getElementById('btn-next'):document.getElementById('btn-prev');
  if(b&&!b.disabled) b.click();
},{passive:true});

/* ── TOUCH EVENTS ── */
let pinchDist0 = null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0];
    dragFrom={x:t.clientX,y:t.clientY};
    lastM={x:t.clientX,y:t.clientY};
    isDrag=false;
  } else if(e.touches.length===2){
    pinchDist0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
  }
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1){
    const t=e.touches[0];
    const dx=t.clientX-lastM.x, dy=t.clientY-lastM.y;
    if(Math.hypot(t.clientX-dragFrom.x,t.clientY-dragFrom.y)>6){
      isDrag=true;
      if(!CUR_STEP_DATA||CUR_STEP_DATA.auto||rotateMode){
        camYaw+=dx*.007; camPitch+=dy*.007;
        camPitch=Math.max(.08,Math.min(1.48,camPitch));
      }
    }
    ghostGrid=screenToGrid(t.clientX,t.clientY);
    lastM={x:t.clientX,y:t.clientY};
  } else if(e.touches.length===2 && pinchDist0){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const minD = SIZE>=19 ? HALF*.22 : SIZE>=13 ? HALF*.50 : HALF*.80;
    camDist=Math.max(minD,Math.min(HALF*2.8,camDist-(d-pinchDist0)*(HALF/240)));
    pinchDist0=d;
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  pinchDist0=null;
  if(!isDrag && e.changedTouches.length===1){
    const t=e.changedTouches[0];
    const g=screenToGrid(t.clientX,t.clientY);
    if(g) onClick3D(g.gx,g.gz);
  }
  ghostGrid=null;
},{passive:false});

window.setBoardSize = function(n) {
  SIZE = n;
  CELL = n===9 ? 48 : n===13 ? 32 : 22;
  HALF = (SIZE-1)*CELL/2;

  game.reset();

  document.getElementById('bp-desc').textContent = BP_DESCS[n];
  const idx = BP_SIZES.indexOf(n);

  if(prev) prev.disabled = (idx<=0);
  if(next) next.disabled = (idx>=BP_SIZES.length-1);

};

  const active = document.querySelector('.bp-btn.active');

};

const STEP_T = {
  'l1-0':{
    en:{text:`<p>Go is a two-player strategy game played on a <strong>19×19</strong> board. A <strong>9×9</strong> board is better for beginners.</p><p>It is a sequential move game — <strong>black</strong> plays first.</p>`,fb:'Explore board sizes to see the difference.'},
    ru:{text:`<p>Го — стратегическая игра для двух игроков на доске <strong>19×19</strong>. Для начинающих лучше подходит доска <strong>9×9</strong>.</p><p>Ходы делаются поочерёдно — <strong>чёрные</strong> ходят первыми.</p>`,fb:'Попробуйте разные размеры доски.'},
  },
  'l1-1':{
    en:{text:`<p>Stones are placed not inside squares, but on the <strong>intersections of lines</strong>.</p><p>Click anywhere on the board to <strong>place a black stone.</strong></p>`,fb:'Click on any intersection!',fb_ok:'Perfect! You placed the stone correctly.'},
    ru:{text:`<p>Камни размещаются не внутри клеток, а на <strong>пересечениях линий</strong>.</p><p>Нажмите на любую точку доски, чтобы <strong>поставить чёрный камень.</strong></p>`,fb:'Нажмите на любое пересечение!',fb_ok:'Отлично! Камень поставлен верно.'},
  },
  'l1-2':{
    en:{text:`<p>Once placed, stones <strong>cannot be moved</strong> — they can only be removed by capture.</p><div class="highlight-box">In Go, stones don't move — they are only added or removed.</div>`,fb:'This white stone is now fixed at that point.'},
    ru:{text:`<p>После размещения камни <strong>нельзя перемещать</strong> — их можно только захватить и убрать с доски.</p><div class="highlight-box">В Го камни не двигаются — их только добавляют или убирают.</div>`,fb:'Этот белый камень теперь стоит на месте.'},
  },
  'l2-0':{
    en:{text:`<p>The empty points adjacent to a stone are called its <strong><span class="term">liberties</span></strong>.</p><p>A stone in the center has <strong>4 liberties</strong> (up, down, left, right).</p>`,fb:'The black stone in the center has 4 liberties.'},
    ru:{text:`<p>Пустые точки рядом с камнем называются его <strong><span class="term">свободами</span></strong>.</p><p>Камень в центре имеет <strong>4 свободы</strong> (вверх, вниз, влево, вправо).</p>`,fb:'Чёрный камень в центре имеет 4 свободы.'},
  },
  'l2-1':{
    en:{text:`<p>A stone on the edge has <strong>3 liberties</strong>, and a corner stone has only <strong>2 liberties</strong>.</p><div class="highlight-box">Fewer liberties means more vulnerable. Corner and edge stones are more exposed.</div>`,fb:'Corner: 2 · Edge: 3 · Center: 4 liberties'},
    ru:{text:`<p>Камень на краю имеет <strong>3 свободы</strong>, а угловой — только <strong>2 свободы</strong>.</p><div class="highlight-box">Меньше свобод — больше уязвимость. Угловые и краевые камни более уязвимы.</div>`,fb:'Угол: 2 · Край: 3 · Центр: 4 свободы'},
  },
  'l2-2':{
    en:{text:`<p>Horizontally or vertically connected stones form a <strong>group</strong>. A group's liberties are the total empty adjacent points of all its stones.</p>`,fb:'These three stones form a group — together they have 8 liberties.'},
    ru:{text:`<p>Горизонтально или вертикально связанные камни образуют <strong>группу</strong>. Свободы группы — сумма пустых смежных точек всех её камней.</p>`,fb:'Эти три камня — группа. Вместе у них 8 свобод.'},
  },
  'l3-0':{
    en:{text:`<p>When <strong>all liberties of a stone are filled</strong>, it is captured and removed from the board.</p><p>The white stone has one empty point left — place a black stone there to capture it! <strong>Click E4.</strong></p>`,fb:'Click the last liberty of the white stone!',fb_ok:'Captured! The white stone is removed from the board.',fb_err:'Find the empty point around the white stone.'},
    ru:{text:`<p>Когда <strong>все свободы камня заполнены</strong>, он захватывается и убирается с доски.</p><p>У белого камня осталась одна пустая точка — поставьте туда чёрный камень! <strong>Нажмите E4.</strong></p>`,fb:'Нажмите на последнюю свободу белого камня!',fb_ok:'Захвачен! Белый камень убран с доски.',fb_err:'Найдите пустую точку рядом с белым камнем.'},
  },
  'l3-1':{
    en:{text:`<p>To capture a <strong>group</strong>, you must fill all of its liberties.</p><p>Fill the last liberty of the two white stones — <strong>click D5.</strong></p>`,fb:'Find the last empty point of the two white stones.',fb_ok:'You captured the group!',fb_err:'Find the last liberty of the white group.'},
    ru:{text:`<p>Чтобы захватить <strong>группу</strong>, нужно заполнить все её свободы.</p><p>Заполните последнюю свободу двух белых камней — <strong>нажмите D5.</strong></p>`,fb:'Найдите последнюю пустую точку у двух белых камней.',fb_ok:'Группа захвачена!',fb_err:'Найдите последнюю свободу белой группы.'},
  },
  'l3-2':{
    en:{text:`<p>One more! A <strong>3-stone white group</strong> is surrounded by black.</p><p>Find the last liberty of the white group — <strong>click E6.</strong></p>`,fb:'Find the last empty point of the 3-stone white group.',fb_ok:'Excellent! Three white stones captured at once.',fb_err:'Click E6 — the only empty neighbor of white.'},
    ru:{text:`<p>Ещё пример! <strong>Группа из 3 белых камней</strong> окружена чёрными.</p><p>Найдите последнюю свободу белой группы — <strong>нажмите E6.</strong></p>`,fb:'Найдите последнюю пустую точку группы из 3 белых.',fb_ok:'Отлично! Три белых камня захвачены сразу.',fb_err:'Нажмите E6 — единственный пустой сосед белых.'},
  },
  'l4-0':{
    en:{text:`<p>You <strong>cannot</strong> make a move that leaves your own stone without liberties — this is the <span class="term">self-capture</span> rule.</p><p>This board has <strong>4 forbidden points</strong>. Notice the X marks — black cannot place stones there.</p>`,fb:'4 forbidden points: black cannot enter spaces enclosed by white.'},
    ru:{text:`<p>Нельзя делать ход, оставляющий собственный камень без свобод — это правило <span class="term">самозахвата</span>.</p><p>На этой доске <strong>4 запрещённых пункта</strong>. Метки X — чёрные не могут туда ходить.</p>`,fb:'4 запрещённых пункта: нельзя входить в пространства, окружённые белыми.'},
  },
  'l4-1':{
    en:{text:`<p><strong>Exception:</strong> a move that looks like self-capture is <em>legal</em> if it captures an opponent's group.</p><p>Black captures 5 white stones above, white captures 5 black stones below — watch the capture exception.</p>`,fb:'Watch the capture exception — two moves play out.'},
    ru:{text:`<p><strong>Исключение:</strong> ход, похожий на самозахват, <em>разрешён</em>, если он захватывает группу противника.</p><p>Чёрные захватывают 5 белых сверху, белые — 5 чёрных снизу. Наблюдайте исключение захвата.</p>`,fb:'Наблюдайте исключение захвата — два хода разыгрываются.'},
  },
  'l5-0':{
    en:{text:`<p><span class="term">Ko</span> — the rule that prevents the same board position from repeating indefinitely.</p><p>Black captures white — but white <strong>cannot immediately recapture</strong>, as it would return the board to the previous position.</p>`,fb:'Black captured — white cannot immediately return. This is Ko!'},
    ru:{text:`<p><span class="term">Ко</span> — правило, запрещающее бесконечное повторение одной позиции.</p><p>Чёрные захватывают белого — но белые <strong>не могут сразу ответить захватом</strong>, иначе позиция повторится.</p>`,fb:'Чёрные захватили — белые не могут сразу вернуться. Это Ко!'},
  },
  'l5-1':{
    en:{text:`<p>In a ko fight, players make <strong>"ko threats"</strong> — important moves elsewhere on the board. White threatens first, black responds, then white recaptures the ko.</p>`,fb:'Red = ko forbidden. White threatens → black responds → green = now free!'},
    ru:{text:`<p>В борьбе за ко игроки делают <strong>«угрозы ко»</strong> — важные ходы в другом месте. Белые угрожают, чёрные отвечают, затем белые снова берут ко.</p>`,fb:'Красный = ко запрещён. Белые угрожают → чёрные отвечают → зелёный = можно!'},
  },
  'l6-0':{
    en:{text:`<p>The game ends when both players <strong>pass consecutively</strong>.</p><p>The winner is the player who enclosed <strong>more territory</strong>. Territory = empty points surrounded by your stones.</p>`,fb:'Black left (20 pts) · White right (22 pts) — white is ahead!'},
    ru:{text:`<p>Игра заканчивается, когда оба игрока <strong>пасуют подряд</strong>.</p><p>Побеждает тот, кто окружил <strong>больше территории</strong>. Территория = пустые точки, окружённые вашими камнями.</p>`,fb:'Чёрные слева (20 очков) · Белые справа (22 очка) — белые впереди!'},
  },
  'l6-1':{
    en:{text:`<p>Scoring: <strong>Territory</strong> + <strong>Prisoners</strong> + <strong>Komi</strong> (a bonus given to white, usually 6.5)</p><div class="highlight-box">Komi balances the advantage of black moving first.</div>`,fb:'Komi is usually 6.5.'},
    ru:{text:`<p>Подсчёт: <strong>Территория</strong> + <strong>Пленники</strong> + <strong>Коми</strong> (бонус белым, обычно 6.5)</p><div class="highlight-box">Коми компенсирует преимущество первого хода чёрных.</div>`,fb:'Коми обычно равно 6.5.'},
  },
  'l7-0':{
    en:{text:`<p>A group with <strong>two eyes</strong> can never be captured — it is <em>immortal.</em></p><p><span class="term">Eye</span> = an empty point inside a group. <strong>Green markers</strong> show all living groups — each has two eyes.</p>`,fb:'Green cross = living group eye · Red cross = no two eyes, mortal point'},
    ru:{text:`<p>Группа с <strong>двумя глазами</strong> никогда не может быть захвачена — она <em>бессмертна.</em></p><p><span class="term">Глаз</span> = пустая точка внутри группы. <strong>Зелёные маркеры</strong> — живые группы, у каждой два глаза.</p>`,fb:'Зелёный крест = глаз живой группы · Красный крест = нет двух глаз, смертная точка'},
  },
  'l7-1':{
    en:{text:`<p><strong>False eye</strong> — a point that can be filled by the opponent is not a true eye.</p><div class="highlight-box">Two real eyes = immortal group. One of the most fundamental concepts in Go.</div>`,fb:'Red marker = single eye, mortal group — can be captured!'},
    ru:{text:`<p><strong>Ложный глаз</strong> — точка, которую может занять противник, не является настоящим глазом.</p><div class="highlight-box">Два настоящих глаза = бессмертная группа. Важнейший концепт Го.</div>`,fb:'Красный маркер = один глаз, смертная группа — может быть захвачена!'},
  },
  'l8-0':{
    en:{text:`<p><span class="term">Cut</span> — breaking your opponent's connection by playing between two of their stones.</p><p>Cut between black's two stones — <strong>click E4.</strong></p>`,fb:"Cut between black's two stones!",fb_ok:"Cut! Black is now two separate groups.",fb_err:"Find the gap connecting black's two stones."},
    ru:{text:`<p><span class="term">Разрезание</span> — разрыв связи противника путём хода между двумя его камнями.</p><p>Разрежьте между двумя чёрными камнями — <strong>нажмите E4.</strong></p>`,fb:'Разрежьте между двумя чёрными камнями!',fb_ok:'Разрезание! Теперь чёрные — две отдельные группы.',fb_err:'Найдите точку между двумя чёрными камнями.'},
  },
  'l8-1':{
    en:{text:`<p><span class="term">Connect</span> — closing the gap between your own stones to strengthen the group.</p><p>Connect the black stones — <strong>click D4.</strong></p>`,fb:'Connect your black stones!',fb_ok:'Strong connection! Now they are one group.',fb_err:'Fill the gap between the black stones.'},
    ru:{text:`<p><span class="term">Связывание</span> — соединение своих камней для усиления группы.</p><p>Соедините чёрные камни — <strong>нажмите D4.</strong></p>`,fb:'Соедините чёрные камни!',fb_ok:'Крепкая связь! Теперь они одна группа.',fb_err:'Заполните зазор между чёрными камнями.'},
  },
  'l9-0':{
    en:{text:`<p><span class="term">Double atari</span> — threatening two separate groups at once with a single move. White cannot save both.</p><p>Find and play the double atari point!</p>`,fb:'Find the point that puts both white groups in atari at once!',fb_ok:'Double atari! If the right one escapes, the left is captured — what if it saves the left?',fb_err:'Find the point that threatens both white groups.'},
    ru:{text:`<p><span class="term">Двойное атари</span> — одним ходом угрожать двум разным группам противника. Белые не могут спасти обе.</p><p>Найдите и сыграйте точку двойного атари!</p>`,fb:'Найдите точку, ставящую обе белые группы в атари!',fb_ok:'Двойное атари! Спасут правую — захватим левую. А если спасут левую?',fb_err:'Найдите точку, угрожающую обеим белым группам.'},
  },
  'l9-1':{
    en:{text:`<p>Now play as <strong>white</strong> — which stone will you save?</p><div class="highlight-box">Whichever you choose, the other stone is captured.</div>`,fb:'Play next to one of the white stones.',fb_ok:'You saved one stone — but the other is captured. There is no escape from double atari!',fb_err:'Play next to one of the white stones to save it.'},
    ru:{text:`<p>Теперь играйте за <strong>белых</strong> — какой камень спасёте?</p><div class="highlight-box">Что бы вы ни выбрали, другой камень захватят.</div>`,fb:'Сыграйте рядом с одним из белых камней.',fb_ok:'Вы спасли один камень — но другой захвачен. От двойного атари не уйти!',fb_err:'Сыграйте рядом с одним из белых камней, чтобы спасти его.'},
  },
  'l10-0':{
    en:{text:`<p><span class="term">Ladder</span> (Japanese: <em>shicho</em>) — a stone fleeing from atari is put in atari again each move and driven toward a corner.</p><p>Watch the cycle as white tries to escape and black chases.</p>`,fb:'White approaches the corner with each escape — the ladder eventually traps it.'},
    ru:{text:`<p><span class="term">Лестница</span> (яп.: <em>сичо</em>) — камень, убегающий от атари, снова попадает в атари с каждым ходом и загоняется в угол.</p><p>Наблюдайте цикл: белые убегают, чёрные преследуют.</p>`,fb:'С каждым бегством белые приближаются к углу — лестница их ловит.'},
  },
  'l10-1':{
    en:{text:`<p><strong>Ladder breaker</strong> — if a friendly stone lies in the ladder's path, the escaping group connects to it and survives.</p><div class="highlight-box">Before playing a ladder, check the entire path of the escaping stone!</div>`,fb:'White connected to the ladder-breaking stone — no longer driven to the corner!'},
    ru:{text:`<p><strong>Разрушитель лестницы</strong> — если на пути лестницы стоит союзный камень, убегающая группа соединяется с ним и спасается.</p><div class="highlight-box">Прежде чем играть лестницу, проверьте весь путь убегающего камня!</div>`,fb:'Белые соединились с разрушителем лестницы — больше не загоняются в угол!'},
  },
  'l11-0':{
    en:{text:`<p><span class="term">Net</span> (Japanese: <em>geta</em>) — trapping a stone by cutting off its escape routes without putting it in atari.</p><p>Find the point that cuts off white's escape — <strong>click F6.</strong></p>`,fb:"Cut off all of white's escape routes!",fb_ok:'Net set! White tries to escape but is trapped.',fb_err:"Find the point that cuts off white's escape routes."},
    ru:{text:`<p><span class="term">Сеть</span> (яп.: <em>гэта</em>) — ловушка для камня путём перекрытия всех путей к бегству, без постановки в атари.</p><p>Найдите точку, перекрывающую путь белых — <strong>нажмите F6.</strong></p>`,fb:'Перекройте все пути бегства белых!',fb_ok:'Сеть расставлена! Белые в ловушке.',fb_err:'Найдите точку, перекрывающую пути бегства белых.'},
  },
  'l12-0':{
    en:{text:`<p><span class="term">Snapback</span> — capturing a larger group by sacrificing a stone.</p><p>Sacrifice — <strong>click D5.</strong></p>`,fb:'Sacrifice — white will take, but lose a bigger group!',fb_ok:'Snapback started! White took the bait but fell into the trap.',fb_err:'Click D5 — sacrifice the stone.'},
    ru:{text:`<p><span class="term">Снэпбэк</span> — захват большой группы путём жертвы камня.</p><p>Пожертвуйте камень — <strong>нажмите D5.</strong></p>`,fb:'Жертва — белые возьмут, но потеряют группу побольше!',fb_ok:'Снэпбэк начался! Белые взяли приманку, но попали в ловушку.',fb_err:'Нажмите D5 — пожертвуйте камень.'},
  },
  'l12-1':{
    en:{text:`<p>One more snapback example. Sacrifice — <strong>click A5.</strong></p>`,fb:'Sacrifice — white will take, but lose the group!',fb_ok:'Snapback! White took the bait but fell into the trap.',fb_err:'Click A5 — sacrifice the stone.'},
    ru:{text:`<p>Ещё один пример снэпбэка. Пожертвуйте камень — <strong>нажмите A5.</strong></p>`,fb:'Жертва — белые возьмут, но потеряют группу!',fb_ok:'Снэпбэк! Белые взяли приманку, но попали в ловушку.',fb_err:'Нажмите A5 — пожертвуйте камень.'},
  },
  'l13-0':{
    en:{text:`<p>A real opening on a 19×19 board. Observe the corner plays, side placements, and early contest for the center.</p><div class="highlight-box">In the opening, think about the whole board — corner, side, center in order.</div>`,fb:'19×19 opening — corners taken, groups beginning to form.'},
    ru:{text:`<p>Настоящее начало партии на доске 19×19. Наблюдайте за угловыми ходами, размещением на сторонах и борьбой за центр.</p><div class="highlight-box">В дебюте думайте о всей доске — угол, сторона, центр по порядку.</div>`,fb:'19×19 дебют — углы заняты, группы начинают формироваться.'},
  },
  'l13-1':{
    en:{text:`<p><span class="term">Fuseki</span> — the opening phase of Go. The first 10-20 moves determine the overall shape of the board.</p><p>Basic strategy: build territory in the order <strong>corner → side → center</strong>.</p>`,fb:'Corners are the most valuable areas.'},
    ru:{text:`<p><span class="term">Фусеки</span> — дебютная стадия Го. Первые 10-20 ходов определяют общую структуру доски.</p><p>Базовая стратегия: строить территорию по порядку <strong>угол → сторона → центр</strong>.</p>`,fb:'Углы — самые ценные области.'},
  },
  'l13-2':{
    en:{text:`<p>Standard opening points:<ul><li><strong>Hoshi (4-4)</strong> — balanced, flexible</li><li><strong>Komoku (3-4)</strong> — territory-oriented</li><li><strong>San-san (3-3)</strong> — secure corner, less influence</li></ul>Click a corner point.</p>`,fb:'Choose one of the corner points.',fb_ok:'Good choice! You opened from the corner.'},
    ru:{text:`<p>Стандартные начальные точки:<ul><li><strong>Хоши (4-4)</strong> — сбалансированная, гибкая</li><li><strong>Комоку (3-4)</strong> — ориентированная на территорию</li><li><strong>Сан-сан (3-3)</strong> — угол надёжен, меньше влияния</li></ul>Нажмите на угловую точку.</p>`,fb:'Выберите одну из угловых точек.',fb_ok:'Хороший выбор! Вы открылись из угла.'},
  },
  'l13-3':{
    en:{text:`<p><strong>High (4th line)</strong> moves create influence, <strong>low (3rd line)</strong> moves control territory.</p><div class="highlight-box">The more corners you take in the opening, the greater your initial advantage.</div>`,fb:'All four corners taken — balance.'},
    ru:{text:`<p><strong>Высокие (4-я линия)</strong> ходы создают влияние, <strong>низкие (3-я линия)</strong> — контролируют территорию.</p><div class="highlight-box">Чем больше углов в дебюте, тем больше начальное преимущество.</div>`,fb:'Все четыре угла заняты — баланс.'},
  },
  'l14-0':{
    en:{text:`<p>A real middlegame on a 19×19 board. Groups are intertwined — a different battle in every area.</p><div class="highlight-box">Strengthen your weak groups and pressure your opponent's weak groups.</div>`,fb:'A complex middlegame — black and white groups clash across the whole board.'},
    ru:{text:`<p>Настоящий миттельшпиль на доске 19×19. Группы переплетены — в каждой области своё сражение.</p><div class="highlight-box">Усиляйте свои слабые группы и давите на слабые группы противника.</div>`,fb:'Сложный миттельшпиль — группы чёрных и белых сталкиваются по всей доске.'},
  },
  'l14-1':{
    en:{text:`<p>In the middlegame, groups take shape and battles begin. Key objectives:</p><ul><li><strong>Strengthen</strong> weak groups</li><li><strong>Attack</strong> the opponent's weak groups</li><li><strong>Clarify</strong> territorial boundaries</li></ul>`,fb:'Both sides are building territory.'},
    ru:{text:`<p>В миттельшпиле группы формируются и начинаются сражения. Основные цели:</p><ul><li><strong>Усиливайте</strong> слабые группы</li><li><strong>Атакуйте</strong> слабые группы противника</li><li><strong>Уточняйте</strong> границы территорий</li></ul>`,fb:'Обе стороны строят территорию.'},
  },
  'l14-2':{
    en:{text:`<p><span class="term">Sente</span> — a move that forces the opponent to respond (you keep the initiative).</p><p><span class="term">Gote</span> — a move that gives initiative to the opponent.</p><div class="highlight-box">Make sente moves whenever possible.</div>`,fb:'Sente = offense · Gote = defense'},
    ru:{text:`<p><span class="term">Сэнтэ</span> — ход, на который противник вынужден отвечать (инициатива у вас).</p><p><span class="term">Готэ</span> — ход, передающий инициативу противнику.</p><div class="highlight-box">Делайте сэнтэ всегда, когда возможно.</div>`,fb:'Сэнтэ = атака · Готэ = защита'},
  },
  'l15-0':{
    en:{text:`<p>A real endgame position from a 19×19 game. Territories have taken shape — count the areas and prisoners to find the winner.</p>`,fb:'Endgame — territories and prisoners are counted.'},
    ru:{text:`<p>Реальная позиция в эндшпиле на доске 19×19. Территории сформированы — подсчитайте области и пленников, чтобы определить победителя.</p>`,fb:'Эндшпиль — подсчёт территорий и пленников.'},
  },
  'l15-1':{
    en:{text:`<p><span class="term">Yose</span> — the endgame phase. Boundaries are finalized and every move directly converts to points.</p>`,fb:'Points scored at the end determine the winner.'},
    ru:{text:`<p><span class="term">Ёсэ</span> — заключительная стадия игры. Границы уточняются, каждый ход прямо переводится в очки.</p>`,fb:'Очки в конце игры определяют победителя.'},
  },
  'l15-2':{
    en:{text:`<p>Priority order:<ol><li><strong>Sente endgame</strong> — moves that require a response</li><li><strong>Big gote</strong> — highest-value free moves</li><li><strong>Small gote</strong> — fine detail moves</li></ol></p>`,fb:'Your Go learning journey begins!'},
    ru:{text:`<p>Порядок приоритетов:<ol><li><strong>Сэнтэ-эндшпиль</strong> — ходы, требующие ответа</li><li><strong>Большое готэ</strong> — самые ценные свободные ходы</li><li><strong>Малое готэ</strong> — тонкие детальные ходы</li></ol></p>`,fb:'Ваше путешествие в мир Го начинается!'},
  },
};

function t(key) { return (UI_T[currentLang]||UI_T.tr)[key] ?? UI_T.tr[key] ?? ''; }
function stepT(lid, idx, field) {
  if(currentLang==='tr') return null;
  return STEP_T[`${lid}-${idx}`]?.[currentLang]?.[field] || null;
}
window.setLang = function(lang) {
  currentLang = lang;
  localStorage.setItem('go_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang));
  applyLang();
};
function applyLang() {
  document.documentElement.lang = currentLang;
  document.querySelector('.back-btn').textContent = t('backBtn');
  document.querySelector('.page-title').textContent = t('pageTitle');
  document.querySelector('.sb-header').textContent = t('curriculum');
  const bpLabel = document.querySelector('.bp-label');
  if(bpLabel) bpLabel.textContent = t('boardSize');
  document.querySelectorAll('.bp-btn').forEach(b=>{
    const sub=b.querySelector('.bp-sub'); if(sub) sub.textContent=t('bp'+b.dataset.size+'sub');
  });
  document.getElementById('bp-desc').textContent = t('bp'+(SIZE||9)+'desc');
  document.getElementById('btn-prev').textContent = t('prevBtn');
  document.getElementById('btn-next').textContent = t('nextBtn');
  document.getElementById('hint').innerHTML = t('hint');
  const rtBtn=document.getElementById('rotate-toggle');
  if(rtBtn) rtBtn.textContent = rotateMode ? t('rotateModeOff') : t('rotateModeOn');
  buildSidebar();
  if(CUR_STEP_DATA) loadStep(CUR_STEP);
  else {
    document.getElementById('lesson-title').textContent = t('selectLesson');
    document.getElementById('lesson-body').innerHTML = t('selectLessonBody');
    setFb(t('selectLessonFb'), 'info');
  }
}

    { id:'l8', title:'Kesme ve Bağlama', steps:[

    ]},

    { id:'l9', title:'Çift Atari', steps:[

        fb_ok:'Çift atari! Sağdaki kurtarılırsa sol yakalanır — ya solu kurtarırsa?',
        fb_err:'Her iki beyaz gruba da atari yapacak noktayı bul.' },

      { text:`<p>Şimdi <strong>beyaz olarak</strong> oyna — hangi taşı kurtarırsın?</p><div class="highlight-box">Hangisini seçersen seç, diğer taş yakalanır.</div>`,
        board:[{color:'W',x:5,y:3},{color:'W',x:4,y:4},{color:'B',x:4,y:3},{color:'B',x:6,y:3},{color:'B',x:5,y:4},{color:'B',x:4,y:5}],

        fb_err:'Beyaz taşlardan birini kurtarmak için yanındaki boş noktaya oyna.' },
    ]},
