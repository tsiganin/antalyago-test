<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Öğren – Antalya GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f2f5;
            --panel-white: #ffffff;
            --accent-green: #a8d5ba;
            --accent-green-dark: #8ebf9f;
            --text-main: #2d2e32;
            --text-muted: #6b7280;
            --btn-dark: #2d2e32;
            --radius-lg: 20px;
            --radius-sm: 12px;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.03);
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column;
            box-sizing: border-box; overflow: hidden;
        }

        /* Üst Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-white);
            padding: 12px 30px; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); margin-bottom: 20px;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area a { text-decoration: none; color: var(--text-muted); font-size: 1.4rem; }
        h1 { margin: 0; font-size: 1.1rem; font-weight: 600; }

        .progress-container { display: flex; align-items: center; gap: 15px; }
        .prog-bar-bg { width: 120px; height: 8px; background: #eee; border-radius: 10px; overflow: hidden; }
        #prog-fill { height: 100%; background: var(--accent-green); transition: 0.3s; width: 0%; }
        #prog-text { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }

        /* Ana Layout */
        .main-wrapper { display: flex; gap: 20px; flex: 1; min-height: 0; }

        /* Sol Panel */
        .side-panel {
            width: 320px; background: var(--panel-white);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-soft);
            display: flex; flex-direction: column; padding: 25px;
        }

        .side-panel h3 {
            font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);
            letter-spacing: 1.5px; margin: 0 0 15px 0;
        }

        #curriculum { overflow-y: auto; flex: 1; }
        .lesson-item {
            padding: 12px 15px; margin-bottom: 6px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.9rem; transition: 0.2s; background: #f9fafb;
            display: flex; align-items: center; gap: 10px;
        }
        .lesson-item.active { background: var(--accent-green); color: white; font-weight: 600; }
        .lesson-item.done .li-check { color: #4ade80; display: inline; }
        .li-check { display: none; }

        /* Orta Alan: Tahta ve Açıklama */
        .board-container {
            flex: 1; display: flex; flex-direction: column; gap: 20px;
        }

        .board-card {
            flex: 1; background: var(--panel-white); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); position: relative;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }

        canvas#goban {
            max-width: 100%; max-height: 100%; cursor: crosshair;
            border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Bilgi Kutusu */
        .info-card {
            background: var(--panel-white); border-radius: var(--radius-lg);
            padding: 20px 30px; box-shadow: var(--shadow-soft);
        }
        #lesson-body { font-size: 1rem; line-height: 1.6; color: #4b5563; }
        #lesson-body p { margin: 0 0 10px 0; }
        .highlight { background: #fffbeb; border-left: 4px solid #f6ad55; padding: 10px; margin: 10px 0; font-size: 0.9rem; }

        /* Alt Kontroller */
        .control-bar {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-white); padding: 15px 30px;
            border-radius: var(--radius-lg); box-shadow: var(--shadow-soft);
        }

        .feedback-box { display: flex; align-items: center; gap: 10px; font-weight: 500; font-size: 0.9rem; }
        .feedback-box.correct { color: #16a34a; }
        .feedback-box.wrong { color: #dc2626; }
        .feedback-box.info { color: var(--text-muted); }

        .nav-btns { display: flex; gap: 12px; align-items: center; }
        button {
            border: none; padding: 10px 22px; border-radius: 30px;
            font-family: inherit; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        #btn-prev { background: #f3f4f6; color: var(--text-main); }
        #btn-next { background: var(--btn-dark); color: white; }

        /* Tebrik Ekranı */
        #complete-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        #complete-screen.show { display: flex; }
        .modal { background: white; padding: 40px; border-radius: 30px; text-align: center; max-width: 400px; }

        /* Sayfa başlığı altındaki ufak künyeler */
        #chapter-tag { font-size: 0.7rem; color: var(--accent-green-dark); font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <a href="index.html">←</a>
            <div>
                <div id="chapter-tag">BÖLÜM 1</div>
                <h1 id="lesson-title">Yükleniyor...</h1>
            </div>
        </div>
        <div class="progress-container">
            <div class="prog-bar-bg"><div id="prog-fill"></div></div>
            <div id="prog-text">0 / 0</div>
        </div>
    </header>

    <div class="main-wrapper">
        <aside class="side-panel">
            <h3>Müfredat</h3>
            <div id="curriculum">
                </div>
        </aside>

        <main class="board-container">
            <div class="board-card">
                <canvas id="goban"></canvas>
            </div>

            <div class="info-card">
                <div id="lesson-body">
                    </div>
            </div>

            <div class="control-bar">
                <div id="feedback" class="feedback-box info">
                    <span class="fb-icon">💡</span>
                    <span id="fb-text">Tahtayı inceleyin.</span>
                </div>

                <div class="nav-btns">
                    <span id="step-counter" style="font-size: 0.8rem; color: var(--text-muted); margin-right: 10px;">Adım 1/1</span>
                    <button id="btn-prev" onclick="prevStep()">Geri</button>
                    <button id="btn-next" onclick="nextStep()">İleri →</button>
                </div>
            </div>
        </main>
    </div>

    <div id="complete-screen">
        <div class="modal">
            <h2 style="color: var(--accent-green-dark)">🎊 Harika!</h2>
            <p id="complete-msg">Bölümü tamamladın.</p>
            <button id="btn-next" onclick="closeComplete()">Sonraki Bölüm</button>
        </div>
    </div>

    <script src="ogren.js"></script>

</body>
</html>
