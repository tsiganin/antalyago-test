<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Öğren – Antalya GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Resimden çıkarılan renk paleti */
            --bg:          #f2f2f0;
            --bg2:         #ebebea;
            --white:       #ffffff;
            --sage:        #c8d9c0;
            --sage-mid:    #b2c9a8;
            --sage-dark:   #8aaa80;
            --sage-soft:   rgba(184,212,184,.18);
            --sage-glass:  rgba(184,212,184,.28);
            --text:        #2a2a28;
            --text2:       #888884;
            --text3:       #bbbbb8;
            --pill-dark:   #1e1e1c;
            --border:      rgba(0,0,0,.06);
            --border-sage: rgba(138,170,128,.25);
            --shadow-soft: 0 2px 12px rgba(0,0,0,.06);
            --shadow-card: 0 4px 20px rgba(0,0,0,.05);
            --r:           20px;
            --r2:          12px;
            --r3:          30px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            height: 100%; overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* Çok hafif doku */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                radial-gradient(ellipse at 70% 10%, rgba(184,212,184,.2) 0%, transparent 50%),
                radial-gradient(ellipse at 10% 90%, rgba(184,212,184,.12) 0%, transparent 45%);
        }

        /* ── SAYFA ── */
        .page {
            position: relative; z-index: 1;
            height: 100vh;
            display: flex; flex-direction: column;
            padding: 16px; gap: 12px;
        }

        /* ════════════════════
           HEADER
        ════════════════════ */
        header {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 22px; height: 60px;
            background: var(--white);
            border-radius: var(--r3);
            box-shadow: var(--shadow-soft);
            animation: fadeDown .5s ease both;
        }

        .hdr-left { display: flex; align-items: center; gap: 16px; }

        .back-link {
            width: 34px; height: 34px; border-radius: 50%;
            background: var(--bg2); border: none;
            display: flex; align-items: center; justify-content: center;
            text-decoration: none; color: var(--text2); font-size: .9rem;
            transition: all .2s;
        }
        .back-link:hover { background: var(--sage-soft); color: var(--text); }

        .hdr-sep { width: 1px; height: 20px; background: var(--border); }

        #chapter-tag {
            display: block; font-size: .6rem; font-weight: 600;
            letter-spacing: .15em; text-transform: uppercase;
            color: var(--sage-dark); margin-bottom: 2px;
        }
        #lesson-title {
            font-size: .9rem; font-weight: 600; color: var(--text);
            letter-spacing: -.01em;
        }

        /* Progress */
        .prog-wrap { display: flex; align-items: center; gap: 10px; }
        #prog-text { font-size: .72rem; font-weight: 500; color: var(--text2); min-width: 36px; text-align: right; }
        .prog-track {
            width: 90px; height: 4px; border-radius: 4px;
            background: var(--bg2); overflow: hidden;
        }
        #prog-fill { height: 100%; width: 0%; border-radius: 4px; background: var(--sage-mid); transition: width .5s ease; }

        /* ════════════════════
           MAIN
        ════════════════════ */
        .main-wrap {
            flex: 1; min-height: 0;
            display: flex; gap: 12px;
            animation: fadeUp .5s .1s ease both;
        }

        /* ════════════════════
           SIDEBAR
        ════════════════════ */
        .sidebar {
            width: 206px; flex-shrink: 0;
            background: var(--white);
            border-radius: var(--r);
            box-shadow: var(--shadow-card);
            display: flex; flex-direction: column;
            overflow: hidden;
        }

        .sidebar-hdr {
            padding: 16px 16px 10px;
            font-size: .6rem; font-weight: 700;
            letter-spacing: .18em; text-transform: uppercase;
            color: var(--text3); flex-shrink: 0;
            border-bottom: 1px solid var(--border);
        }

        #curriculum { flex: 1; overflow-y: auto; padding: 8px; }
        #curriculum::-webkit-scrollbar { width: 3px; }
        #curriculum::-webkit-scrollbar-thumb { background: var(--bg2); border-radius: 3px; }

        /* JS buildSidebar() class'ları */
        .chapter { margin-bottom: 4px; }

        .chapter-title {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 10px; border-radius: var(--r2);
            font-size: .75rem; font-weight: 600; cursor: pointer;
            color: var(--text2); transition: all .15s; user-select: none;
        }
        .chapter-title:hover { background: var(--bg); color: var(--text); }
        .ch-left { display: flex; align-items: center; gap: 8px; }
        .ch-num {
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--sage-soft); border: 1px solid var(--border-sage);
            color: var(--sage-dark); font-size: .6rem; font-weight: 700;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .ch-arrow { font-size: .6rem; color: var(--text3); transition: transform .2s; }
        .chapter-title.open .ch-arrow { transform: rotate(90deg); }

        .lesson-list { display: none; flex-direction: column; padding: 2px 0 2px 6px; }
        .lesson-list.open { display: flex; }

        .lesson-item {
            display: flex; align-items: center; gap: 6px;
            padding: 7px 10px; margin: 1px 0;
            border-radius: 10px; cursor: pointer;
            font-size: .75rem; color: var(--text2);
            border-left: 2px solid transparent;
            transition: all .15s;
        }
        .lesson-item:hover { background: var(--bg); color: var(--text); }
        .lesson-item.active {
            background: var(--sage-soft); color: var(--sage-dark);
            border-left-color: var(--sage-mid); font-weight: 600;
        }
        .lesson-item.done { color: var(--sage-dark); }
        .lesson-item.done .li-check { display: inline; }
        .li-check { display: none; font-size: .6rem; }
        .li-num { font-size: .62rem; opacity: .5; min-width: 20px; }

        /* ════════════════════
           CONTENT
        ════════════════════ */
        .content-area {
            flex: 1; min-width: 0;
            display: flex; flex-direction: column; gap: 12px;
        }

        .mid-row {
            flex: 1; min-height: 0;
            display: flex; gap: 12px;
        }

        /* ── TAHTA KARTI ── */
        .board-card {
            aspect-ratio: 1; max-height: 100%; flex-shrink: 0;
            background: var(--white);
            border-radius: var(--r);
            box-shadow: var(--shadow-card);
            display: flex; align-items: center; justify-content: center;
            padding: 14px; overflow: hidden; position: relative;
        }

        /* Sage yeşil iç hale — tıpkı resimdeki circular gauge */
        .board-card::after {
            content: '';
            position: absolute; inset: 0; border-radius: var(--r);
            background: radial-gradient(ellipse at 60% 40%, rgba(184,212,184,.15) 0%, transparent 65%);
            pointer-events: none;
        }

        #goban { max-width: 100%; max-height: 100%; display: block; touch-action: none; position: relative; z-index: 1; }

        /* ── AÇIKLAMA KARTI ── */
        .info-card {
            flex: 1; min-width: 0;
            /* Resimdeki sağ panel: sage yeşili frosted */
            background: var(--sage-glass);
            border: 1px solid var(--border-sage);
            border-radius: var(--r);
            box-shadow: var(--shadow-soft);
            padding: 22px 24px;
            overflow-y: auto;
            display: flex; flex-direction: column; gap: .8rem;
            position: relative;
        }

        /* Frosted overlay */
        .info-card::before {
            content: '';
            position: absolute; inset: 0; border-radius: var(--r);
            background: rgba(255,255,255,.45);
            pointer-events: none;
        }

        #lesson-body {
            font-size: .88rem; line-height: 1.78;
            color: rgba(42,42,40,.75);
            position: relative; z-index: 1;
        }
        #lesson-body p { margin: 0 0 .7rem; }
        #lesson-body p:last-child { margin-bottom: 0; }
        #lesson-body strong { color: var(--text); font-weight: 600; }
        #lesson-body em { color: var(--sage-dark); font-style: normal; }
        #lesson-body ul, #lesson-body ol { margin: .3rem 0 .7rem 1.2rem; line-height: 1.9; font-size: .84rem; }

        .highlight {
            background: rgba(255,255,255,.6);
            border-left: 2.5px solid var(--sage-mid);
            padding: 10px 14px; margin: .5rem 0;
            border-radius: 0 10px 10px 0;
            font-size: .84rem; line-height: 1.65; color: var(--text);
            position: relative; z-index: 1;
        }

        .term {
            display: inline-block;
            background: rgba(255,255,255,.7);
            border: 1px solid var(--border-sage);
            border-radius: 6px; padding: .04rem .38rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: .76rem; color: var(--sage-dark); font-weight: 500;
        }

        /* ════════════════════
           FOOTER
        ════════════════════ */
        .footer-bar {
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 22px; height: 56px;
            background: var(--white);
            border-radius: var(--r3);
            box-shadow: var(--shadow-soft);
        }

        /* feedback */
        .feedback-box {
            display: flex; align-items: center; gap: 8px;
            font-size: .82rem; font-weight: 500;
        }
        .feedback-box.info    { color: var(--text2); }
        .feedback-box.correct { color: var(--sage-dark); }
        .feedback-box.wrong   { color: #d07060; }
        .feedback-box .fb-icon { font-size: .95rem; }

        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
        }
        .shake { animation: shake .3s ease; }

        .nav-right { display: flex; align-items: center; gap: 10px; }

        /* Step dots */
        #step-dots { display: flex; gap: 5px; align-items: center; }
        .sdot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--bg2); cursor: pointer; transition: all .2s;
        }
        .sdot.active { background: var(--sage-mid); transform: scale(1.4); }
        .sdot.done   { background: var(--sage); }

        #step-counter {
            font-size: .68rem; font-weight: 500; color: var(--text3);
            font-family: 'JetBrains Mono', monospace; min-width: 48px;
        }

        .nav-sep { width: 1px; height: 18px; background: var(--border); }

        /* Butonlar — resimdeki pill buton tarzı */
        .nav-btn {
            border: none; height: 34px; padding: 0 18px; border-radius: 34px;
            font-family: inherit; font-size: .78rem; font-weight: 500;
            cursor: pointer; transition: all .18s;
            display: flex; align-items: center; gap: 5px;
        }

        #btn-prev {
            background: var(--bg2); color: var(--text2);
        }
        #btn-prev:hover { background: var(--bg); color: var(--text); }

        /* Resimdeki koyu pill buton */
        #btn-next {
            background: var(--pill-dark); color: #fff; font-weight: 600;
        }
        #btn-next:hover { background: #2e2e2c; }
        #btn-next:active { transform: scale(.97); }

        button:disabled { opacity: .28; cursor: not-allowed; pointer-events: none; }

        /* ════════════════════
           TAMAMLANDI MODAL
        ════════════════════ */
        #complete-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: rgba(242,242,240,.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none; align-items: center; justify-content: center;
        }
        #complete-screen.show { display: flex; }

        .modal {
            background: var(--white);
            border-radius: 28px; padding: 40px 44px; text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,.1);
            max-width: 360px; width: 100%;
            animation: popIn .35s ease both;
        }
        .modal-icon { font-size: 2.8rem; margin-bottom: 14px; }
        .modal h2 { font-size: 1.3rem; font-weight: 700; color: var(--text); margin: 0 0 10px; }
        #complete-msg { font-size: .88rem; color: var(--text2); line-height: 1.65; margin: 0 0 24px; }
        .modal-btn {
            background: var(--pill-dark); color: #fff; border: none;
            padding: 12px 28px; border-radius: 30px;
            font-family: inherit; font-size: .85rem; font-weight: 600;
            cursor: pointer; transition: all .18s;
        }
        .modal-btn:hover { background: #2e2e2c; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,.15); }

        /* ── ANİMASYONLAR ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(.9); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* ── RESPONSIVE ── */
        @media(max-width: 820px) {
            .sidebar { display: none; }
            .mid-row { flex-direction: column; }
            .board-card { aspect-ratio: auto; width: 100%; max-height: 280px; }
        }
    </style>
</head>
<body>
<div class="page">

    <!-- HEADER -->
    <header>
        <div class="hdr-left">
            <a href="index.html" class="back-link">←</a>
            <div class="hdr-sep"></div>
            <div>
                <span id="chapter-tag">Yükleniyor…</span>
                <div id="lesson-title">Go Öğren</div>
            </div>
        </div>
        <div class="prog-wrap">
            <span id="prog-text">0/0</span>
            <div class="prog-track"><div id="prog-fill"></div></div>
        </div>
    </header>

    <!-- MAIN -->
    <div class="main-wrap">

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-hdr">Müfredat</div>
            <div id="curriculum"></div>
        </aside>

        <!-- CONTENT -->
        <main class="content-area">
            <div class="mid-row">

                <!-- TAHTA -->
                <div class="board-card">
                    <canvas id="goban"></canvas>
                </div>

                <!-- AÇIKLAMA -->
                <div class="info-card">
                    <div id="lesson-body"></div>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="footer-bar">
                <div id="feedback" class="feedback-box info">
                    <span class="fb-icon">💡</span>
                    <span id="fb-text">Yükleniyor…</span>
                </div>

                <div class="nav-right">
                    <div id="step-dots"></div>
                    <span id="step-counter">1 / 1</span>
                    <div class="nav-sep"></div>
                    <button id="btn-prev" class="nav-btn" onclick="prevStep()">← Geri</button>
                    <button id="btn-next" class="nav-btn" onclick="nextStep()">İleri →</button>
                </div>
            </div>

        </main>
    </div>

    <!-- TAMAMLANDI MODAL -->
    <div id="complete-screen">
        <div class="modal">
            <div class="modal-icon">🎊</div>
            <h2>Tebrikler!</h2>
            <p id="complete-msg"></p>
            <button class="modal-btn" onclick="closeComplete()">Devam Et →</button>
        </div>
    </div>

    <script src="ogren.js"></script>
</div>
</body>
</html>
