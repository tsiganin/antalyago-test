<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Öğren – Antalya GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f2f5;
            --panel-white: #ffffff;
            --accent-green: #a8d5ba;
            --accent-green-dark: #8ebf9f;
            --text-main: #2d2e32;
            --text-muted: #6b7280;
            --btn-dark: #2d2e32;
            --radius-lg: 20px;
            --radius-sm: 12px;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.03);
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column;
            box-sizing: border-box; overflow: hidden;
        }

        /* Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-white); padding: 12px 30px; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); margin-bottom: 20px;
        }

        .header-info h1 { margin: 0; font-size: 1.1rem; font-weight: 700; }
        #chapter-tag { font-size: 0.7rem; color: var(--accent-green-dark); font-weight: 700; text-transform: uppercase; }

        /* Progress Bar */
        .prog-container { display: flex; align-items: center; gap: 10px; }
        .prog-bg { width: 100px; height: 6px; background: #eee; border-radius: 10px; overflow: hidden; }
        #prog-fill { height: 100%; background: var(--accent-green); width: 0%; transition: 0.4s; }
        #prog-text { font-size: 0.8rem; font-weight: 600; color: var(--text-muted); min-width: 40px; }

        /* Main Content */
        .main-wrapper { display: flex; gap: 20px; flex: 1; min-height: 0; }

        /* Sol Panel: Müfredat */
        .side-panel {
            width: 300px; background: var(--panel-white); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); display: flex; flex-direction: column; padding: 20px;
        }
        .side-panel h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; color: var(--text-muted); }
        
        /* ogren.js'nin kullandığı curriculum ID'si */
        #curriculum { flex: 1; overflow-y: auto; }
        .chapter { margin-bottom: 10px; }
        .lesson-item { 
            padding: 10px; margin: 4px 0; border-radius: 8px; cursor: pointer; font-size: 0.9rem; 
            background: #f8f9fa; transition: 0.2s; display: flex; align-items: center; gap: 8px;
        }
        .lesson-item.active { background: var(--accent-green); color: white; font-weight: 600; }
        .lesson-item.done { border-left: 4px solid #4ade80; }

        /* Sağ Alan */
        .content-area { flex: 1; display: flex; flex-direction: column; gap: 15px; }

        /* Board - Goban */
        .board-card {
            flex: 2; background: #fff; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); display: flex; align-items: center; justify-content: center;
            overflow: hidden; padding: 15px;
        }
        canvas#goban { max-width: 100%; max-height: 100%; touch-action: none; }

        /* Info & Lesson Body */
        .info-card {
            flex: 1; background: #fff; border-radius: var(--radius-lg);
            padding: 20px; box-shadow: var(--shadow-soft); overflow-y: auto;
        }
        #lesson-title { margin: 0 0 10px 0; font-size: 1.2rem; color: var(--text-main); }
        #lesson-body { font-size: 0.95rem; line-height: 1.6; color: #444; }
        .highlight { background: #fff9e6; border-left: 4px solid #f6ad55; padding: 10px; margin: 10px 0; border-radius: 4px; }

        /* Footer Controls */
        .footer-controls {
            background: #fff; padding: 12px 25px; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); display: flex; justify-content: space-between; align-items: center;
        }

        /* Feedback Box */
        #feedback { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem; }
        #feedback.info { color: var(--text-muted); }
        #feedback.correct { color: #16a34a; }
        #feedback.wrong { color: #dc2626; }

        .btn-group { display: flex; gap: 10px; align-items: center; }
        button {
            border: none; padding: 10px 20px; border-radius: 30px; font-weight: 600;
            cursor: pointer; transition: 0.2s; font-family: inherit; font-size: 0.85rem;
        }
        #btn-prev { background: #f0f2f5; color: var(--text-main); }
        #btn-next { background: var(--btn-dark); color: #fff; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Dots & Counter */
        #step-dots { display: flex; gap: 6px; margin-right: 15px; }
        .sdot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; cursor: pointer; }
        .sdot.active { background: var(--accent-green); transform: scale(1.2); }
        .sdot.done { background: var(--accent-green-dark); }
        #step-counter { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; }

        /* Complete Screen */
        #complete-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        #complete-screen.show { display: flex; }
        .modal { background: #fff; padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }

    </style>
</head>
<body>

    <header>
        <div class="header-info" style="display: flex; align-items: center; gap: 20px;">
            <a href="index.html" style="text-decoration:none; font-size: 1.5rem; color: var(--text-muted);">←</a>
            <div>
                <span id="chapter-tag">Yükleniyor...</span>
                <h1 id="lesson-title">Ders Başlığı</h1>
            </div>
        </div>
        <div class="prog-container">
            <div id="prog-text">0/0</div>
            <div class="prog-bg"><div id="prog-fill"></div></div>
        </div>
    </header>

    <div class="main-wrapper">
        <aside class="side-panel">
            <h3>Müfredat</h3>
            <div id="curriculum"></div>
        </aside>

        <main class="content-area">
            <div class="board-card">
                <canvas id="goban"></canvas>
            </div>

            <div class="info-card">
                <div id="lesson-body"></div>
            </div>

            <div class="footer-controls">
                <div id="feedback" class="info">
                    <span class="fb-icon">💡</span>
                    <span id="fb-text">Yükleniyor...</span>
                </div>

                <div class="btn-group">
                    <div id="step-dots"></div>
                    <span id="step-counter">0/0</span>
                    <button id="btn-prev" onclick="prevStep()">Geri</button>
                    <button id="btn-next" onclick="nextStep()">İleri →</button>
                </div>
            </div>
        </main>
    </div>

    <div id="complete-screen">
        <div class="modal">
            <h2 style="color: var(--accent-green-dark); margin-top: 0;">🎊 Tebrikler!</h2>
            <p id="complete-msg"></p>
            <button id="btn-next" onclick="closeComplete()" style="background: var(--btn-dark); color: #fff; padding: 12px 30px;">Devam Et</button>
        </div>
    </div>

    <script src="ogren.js"></script>

</body>
</html>
