<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Öğren 3D – Antalya GO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f0f2f5;
            --panel-white: #ffffff;
            --accent-green: #a8d5ba; /* Resimdeki soft yeşil */
            --accent-green-dark: #8ebf9f;
            --text-main: #2d2e32;
            --text-muted: #6b7280;
            --btn-dark: #2d2e32; /* Resimdeki koyu buton rengi */
            --radius-lg: 20px;
            --radius-sm: 12px;
            --shadow-soft: 0 10px 30px rgba(0,0,0,0.03);
        }

        body {
            margin: 0; padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh; display: flex; flex-direction: column;
            box-sizing: border-box; overflow: hidden;
        }

        /* Üst Header */
        header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--panel-white);
            padding: 12px 30px; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); margin-bottom: 20px;
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area a { text-decoration: none; color: var(--text-muted); font-size: 1.4rem; font-weight: 300; }
        h1 { margin: 0; font-size: 1.1rem; font-weight: 600; color: var(--text-main); }

        .lang-switch span {
            margin-left: 15px; font-size: 0.85rem; font-weight: 600;
            color: var(--text-muted); cursor: pointer; transition: 0.2s;
        }
        .lang-switch span.active { color: var(--accent-green-dark); border-bottom: 2px solid var(--accent-green); }

        /* Ana Layout */
        .main-wrapper { display: flex; gap: 20px; flex: 1; min-height: 0; }

        /* Sol Panel: Müfredat */
        .curriculum-card {
            width: 300px; background: var(--panel-white);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-soft);
            display: flex; flex-direction: column; padding: 25px;
        }

        .curriculum-card h3 {
            font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);
            letter-spacing: 1.5px; margin: 0 0 20px 0; font-weight: 700;
        }

        #lesson-list {
            list-style: none; padding: 0; margin: 0; overflow-y: auto; flex: 1;
        }

        #lesson-list li {
            padding: 14px 18px; margin-bottom: 8px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 0.95rem; transition: 0.2s; color: #4b5563;
            background: #f9fafb;
        }

        #lesson-list li:hover { background: #f0f2f5; }
        #lesson-list li.active { background: var(--accent-green); color: white; font-weight: 600; }

        /* Sağ Alan: Canvas ve Kontroller */
        .viewport-container { flex: 1; display: flex; flex-direction: column; gap: 20px; }

        #canvas-frame {
            flex: 1; background: #ffffff; border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); position: relative; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.01);
        }

        /* Alt Kontrol Barı */
        .control-bar {
            background: var(--panel-white); border-radius: var(--radius-lg);
            box-shadow: var(--shadow-soft); padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .board-sizes { display: flex; align-items: center; gap: 12px; font-size: 0.85rem; color: var(--text-muted); }
        .size-pill {
            padding: 7px 16px; background: #f3f4f6; border-radius: 20px;
            text-decoration: none; color: inherit; transition: 0.2s; font-weight: 500;
        }
        .size-pill.active { background: var(--accent-green); color: white; }

        .action-btns { display: flex; gap: 12px; }
        button {
            border: none; padding: 12px 24px; border-radius: 30px;
            font-family: inherit; font-weight: 500; cursor: pointer; transition: 0.2s;
            font-size: 0.9rem;
        }
        .btn-secondary { background: #f3f4f6; color: var(--text-main); }
        .btn-primary { background: var(--btn-dark); color: white; }
        .btn-primary:hover { background: #45474d; transform: translateY(-1px); }

        .footer-hint { text-align: center; font-size: 0.75rem; color: var(--text-muted); margin-top: -10px; opacity: 0.7; }

        /* Tebrik Popup */
        #congrats-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 40px; border-radius: 30px; text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1); display: none; z-index: 100;
            border: 1px solid var(--accent-green);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <a href="index.html">←</a>
            <h1>Antalya GO <span style="font-weight: 400; color: var(--text-muted); margin-left: 5px;">| 3D Öğren</span></h1>
        </div>
        <div class="lang-switch">
            <span class="active">TR</span>
            <span>EN</span>
            <span>RU</span>
        </div>
    </header>

    <div class="main-wrapper">
        <aside class="curriculum-card">
            <h3>Müfredat</h3>
            <ul id="lesson-list">
                </ul>
        </aside>

        <main class="viewport-container">
            <div id="canvas-frame">
                <div id="congrats-modal">
                    <h2 style="margin-top:0; color: var(--accent-green-dark);">🎉 Tebrikler!</h2>
                    <p>Harika gidiyorsun! Bu bölümü tamamladın.</p>
                    <button class="btn-primary" onclick="nextLesson()">Devam Et →</button>
                </div>
            </div>

            <div class="control-bar">
                <div class="board-sizes">
                    <span>Tahta:</span>
                    <a href="#" class="size-pill active" onclick="changeSize(9)">9×9</a>
                    <a href="#" class="size-pill" onclick="changeSize(13)">13×13</a>
                    <a href="#" class="size-pill" onclick="changeSize(19)">19×19</a>
                </div>

                <div class="action-btns">
                    <button class="btn-secondary" onclick="resetCamera()">⟳ Döndür</button>
                    <button class="btn-primary" onclick="prevStep()">← Geri</button>
                    <button class="btn-primary" onclick="nextStep()">İleri →</button>
                </div>
            </div>
            <div class="footer-hint">
                Sol Tık: Hamle | Sürükle: Döndür | Tekerlek: Yakınlaş
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="ogren.js"></script>

</body>
</html>
